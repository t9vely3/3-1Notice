<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 - SBS 아카데미</title>
<style>
:root {
  --bg: #f7f7f4;
  --bg-elevated: #ffffff;
  --bg-soft: #f0efea;
  --bg-section: #ebebe5;
  
  --text: #1a1a1a;
  --text-mid: #404040;
  --text-soft: #5c5c5c;
  --text-faint: #909090;
  
  --border: rgba(0, 0, 0, 0.08);
  --border-mid: rgba(0, 0, 0, 0.12);
  
  --accent: #1e3a5f;
  --accent-soft: #e8eef5;
  --accent-deep: #14283f;
  
  --danger: #c8323a;
  --danger-bg: #fce8e9;
  --success: #047857;
  --success-bg: #d1fae5;
  
  --shadow-xs: 0 1px 1px rgba(0,0,0,0.03);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.011em;
}

button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

/* ===== 로그인 화면 ===== */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card {
  background: var(--bg-elevated);
  border-radius: 16px;
  padding: 40px 32px;
  width: 100%;
  max-width: 360px;
  box-shadow: var(--shadow-sm);
  border: 0.5px solid var(--border);
}
.login-logo {
  width: 56px; height: 56px;
  background: var(--accent);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 800;
  font-size: 16px;
  margin: 0 auto 18px;
  letter-spacing: -0.04em;
}
.login-title {
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.login-subtitle {
  text-align: center;
  font-size: 12px;
  color: var(--text-soft);
  margin-bottom: 28px;
}
.login-input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border-mid);
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 12px;
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s;
}
.login-input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.login-btn:hover { background: var(--accent-deep); }
.login-error {
  font-size: 12px;
  color: var(--danger);
  text-align: center;
  margin-top: 12px;
  display: none;
}

/* ===== 메인 레이아웃 ===== */
.app { display: none; min-height: 100vh; }
.app.active { display: flex; }

/* 사이드바 */
.sidebar {
  width: 240px;
  background: var(--bg-elevated);
  border-right: 0.5px solid var(--border);
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  flex-shrink: 0;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 8px 22px;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 14px;
}
.sidebar-logo {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 12.5px;
  font-weight: 800;
  letter-spacing: -0.04em;
}
.sidebar-text { line-height: 1.25; }
.sidebar-name { font-size: 11px; color: var(--text-soft); font-weight: 500; }
.sidebar-title { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; }

.nav-section {
  font-size: 10.5px;
  color: var(--text-faint);
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 10px 8px 6px;
  text-transform: uppercase;
}
.nav-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  background: none;
  border: none;
  border-radius: 8px;
  font-size: 13.5px;
  color: var(--text-mid);
  font-weight: 500;
  text-align: left;
  margin-bottom: 1px;
  letter-spacing: -0.01em;
  transition: background 0.12s;
}
.nav-item:hover { background: var(--bg-soft); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 600;
}
.nav-icon {
  width: 16px; height: 16px;
  flex-shrink: 0;
  stroke-width: 2;
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 12px;
  border-top: 0.5px solid var(--border);
}
.sidebar-footer-link {
  display: block;
  padding: 8px 10px;
  font-size: 12px;
  color: var(--text-faint);
  text-decoration: none;
  border-radius: 6px;
  transition: background 0.12s;
}
.sidebar-footer-link:hover { background: var(--bg-soft); color: var(--text); }

/* ===== 메인 영역 ===== */
.main {
  flex: 1;
  padding: 24px 28px;
  min-width: 0;
}
.main-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
}
.main-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.025em;
}
.main-subtitle {
  font-size: 12.5px;
  color: var(--text-soft);
  margin-top: 3px;
}

/* 상단 액션 */
.action-bar {
  display: flex;
  gap: 10px;
  align-items: center;
}
.btn {
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border-mid);
  background: var(--bg-elevated);
  color: var(--text);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.12s;
}
.btn:hover { background: var(--bg-soft); border-color: var(--border-mid); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-deep); }
.btn-danger {
  color: var(--danger);
  border-color: var(--danger-bg);
}
.btn-danger:hover { background: var(--danger-bg); }
.btn-icon { width: 14px; height: 14px; stroke-width: 2.2; }

/* ===== 테이블/리스트 ===== */
.data-table {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-xs);
}
.table-row {
  display: grid;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border);
  transition: background 0.12s;
}
.table-row:last-child { border-bottom: none; }
.table-row:hover { background: var(--bg); }
.table-row.header {
  background: var(--bg);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-faint);
  letter-spacing: 0.02em;
  text-transform: uppercase;
  padding: 10px 16px;
}
.table-row.header:hover { background: var(--bg); }

/* 공지 테이블 그리드 */
.posts-table .table-row {
  grid-template-columns: 80px 1fr 100px 80px;
  gap: 12px;
}
/* 일정 테이블 그리드 */
.schedule-table .table-row {
  grid-template-columns: 100px 80px 1fr 80px;
  gap: 12px;
}

.cell-tag {
  display: flex;
  justify-content: flex-start;
}
.tag {
  font-size: 10.5px;
  padding: 3px 9px;
  border-radius: 6px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.tag::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.7;
}
.tag-학사 { background: #fce8e9; color: #9a2329; }
.tag-세미나 { background: #ebe9fc; color: #4a3f9a; }
.tag-특강 { background: #ebe9fc; color: #4a3f9a; }
.tag-시설 { background: #ddf3eb; color: #0a5c47; }
.tag-평가 { background: #fbecd5; color: #7a4505; }
.tag-이벤트 { background: #fce8e9; color: #9a2329; }
.tag-취업 { background: #dfeefa; color: #1d4ed8; }
.tag-기타 { background: #ebe9e3; color: #4a4a45; }

.cell-title {
  font-size: 13.5px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cell-date {
  font-size: 12px;
  color: var(--text-soft);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.cell-actions {
  display: flex;
  gap: 4px;
  justify-content: flex-end;
}
.icon-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: none;
  background: none;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-soft);
  transition: all 0.12s;
}
.icon-btn:hover {
  background: var(--bg-soft);
  color: var(--text);
}
.icon-btn.danger:hover {
  background: var(--danger-bg);
  color: var(--danger);
}

.empty-state {
  text-align: center;
  padding: 56px 20px;
  color: var(--text-faint);
  font-size: 13px;
}
.empty-state-icon {
  width: 44px; height: 44px;
  background: var(--bg-soft);
  border-radius: 50%;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
}

/* ===== 모달 ===== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal-backdrop.active { display: flex; }
.modal {
  background: var(--bg-elevated);
  border-radius: 14px;
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 18px 22px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.modal-close {
  background: none;
  border: none;
  width: 28px; height: 28px;
  border-radius: 6px;
  color: var(--text-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
}
.modal-close:hover { background: var(--bg-soft); }
.modal-body {
  padding: 20px 22px;
  overflow-y: auto;
}
.modal-footer {
  padding: 14px 22px;
  border-top: 0.5px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  background: var(--bg);
}

/* ===== 폼 ===== */
.form-row {
  margin-bottom: 16px;
}
.form-row.split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mid);
  margin-bottom: 6px;
  letter-spacing: -0.005em;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border-mid);
  border-radius: 8px;
  font-size: 13.5px;
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  color: var(--text);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  background: var(--bg-elevated);
}
.form-textarea {
  resize: vertical;
  min-height: 120px;
  line-height: 1.6;
  font-family: inherit;
}
.form-help {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 4px;
}

/* ===== 토스트 ===== */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--bg-elevated);
  padding: 11px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
  z-index: 200;
  box-shadow: var(--shadow-lg);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== 확인 모달 ===== */
.confirm-modal { max-width: 400px; }
.confirm-text {
  font-size: 14px;
  color: var(--text-mid);
  line-height: 1.6;
  padding: 4px 0 8px;
}

/* 데모 배너 */
.demo-banner {
  background: #fef3c7;
  color: #78350f;
  padding: 8px 14px;
  font-size: 12px;
  text-align: center;
  font-weight: 500;
}

/* ===== 수업자료 - 카테고리 트리 ===== */
.mat-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 18px;
  align-items: flex-start;
}
.mat-tree {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  box-shadow: var(--shadow-xs);
  position: sticky;
  top: 18px;
  max-height: calc(100vh - 36px);
  overflow-y: auto;
}
.mat-tree-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 8px 10px;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 8px;
}
.mat-tree-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}
.mat-tree-add {
  background: var(--accent);
  color: #fff;
  border: none;
  width: 24px; height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.mat-tree-add:hover { background: var(--accent-deep); }

.mat-tree-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 7px;
  cursor: pointer;
  transition: background 0.12s;
  font-size: 13px;
  color: var(--text-mid);
  font-weight: 500;
}
.mat-tree-item:hover { background: var(--bg-soft); }
.mat-tree-item.active { 
  background: var(--accent-soft); 
  color: var(--accent);
  font-weight: 600;
}
.mat-tree-item.hidden-cat {
  opacity: 0.55;
}
.mat-tree-item-icon {
  width: 16px; height: 16px;
  flex-shrink: 0;
}
.mat-tree-item-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mat-tree-item-badge {
  font-size: 10.5px;
  color: var(--text-faint);
  font-weight: 500;
  flex-shrink: 0;
  padding: 1px 6px;
  background: var(--bg-soft);
  border-radius: 4px;
}
.mat-tree-item.active .mat-tree-item-badge {
  background: rgba(30, 58, 95, 0.1);
}
.mat-tree-item-actions {
  display: none;
  gap: 2px;
  flex-shrink: 0;
}
.mat-tree-item:hover .mat-tree-item-actions { display: flex; }
.mat-tree-item-act {
  width: 22px; height: 22px;
  border-radius: 5px;
  border: none;
  background: none;
  color: var(--text-faint);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.mat-tree-item-act:hover { background: var(--bg-elevated); color: var(--text); }
.mat-tree-item-act.danger:hover { background: var(--danger-bg); color: var(--danger); }

.mat-tree-children {
  margin-left: 22px;
  padding-left: 4px;
  border-left: 1.5px solid var(--border-mid);
  margin-top: 2px;
  margin-bottom: 4px;
}

.mat-tree-empty {
  text-align: center;
  padding: 24px 12px;
  font-size: 12.5px;
  color: var(--text-faint);
}

/* 콘텐츠 영역 */
.mat-content {
  min-height: 400px;
}
.mat-content-empty {
  background: var(--bg-elevated);
  border: 0.5px dashed var(--border-mid);
  border-radius: 12px;
  padding: 60px 20px;
  text-align: center;
  color: var(--text-faint);
  font-size: 13.5px;
}
.mat-content-empty-icon {
  width: 48px; height: 48px;
  background: var(--bg-soft);
  border-radius: 50%;
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
}

.mat-content-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
  gap: 12px;
}
.mat-content-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.3;
}
.mat-content-meta {
  font-size: 12px;
  color: var(--text-soft);
  margin-top: 4px;
}
.mat-content-meta-hidden {
  display: inline-block;
  font-size: 10.5px;
  background: var(--warning-bg);
  color: var(--warning);
  padding: 2px 7px;
  border-radius: 4px;
  margin-left: 6px;
  font-weight: 600;
}

/* 콘텐츠 카드 (관리자) */
.mat-item-card {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 15px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow-xs);
}
.mat-item-card.hidden-mat { opacity: 0.55; }
.mat-item-num {
  width: 26px; height: 26px;
  border-radius: 6px;
  background: var(--accent-soft);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.mat-item-content {
  flex: 1;
  min-width: 0;
}
.mat-item-title {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
}
.mat-item-meta {
  font-size: 11.5px;
  color: var(--text-soft);
  margin-top: 2px;
}
.mat-item-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

/* ===== 모달 - 단계 편집 ===== */
.modal.large { max-width: 720px; }
.modal.xlarge { max-width: 860px; max-height: 95vh; }

.steps-section {
  margin-top: 18px;
  padding-top: 18px;
  border-top: 0.5px solid var(--border);
}
.steps-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.steps-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.step-card {
  background: var(--bg);
  border: 0.5px solid var(--border-mid);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
}
.step-card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  gap: 8px;
}
.step-card-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.step-card-actions {
  display: flex;
  gap: 4px;
}
.step-image-uploader {
  margin-top: 10px;
  border: 1px dashed var(--border-strong);
  border-radius: 8px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  background: var(--bg-elevated);
  color: var(--text-soft);
  font-size: 12.5px;
  font-weight: 500;
  transition: background 0.15s;
}
.step-image-uploader:hover { background: var(--bg-soft); }
.step-image-preview {
  margin-top: 10px;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
}
.step-image-preview img {
  display: block;
  width: 100%;

.icon-picker {

.icon-swatch:hover { background: var(--bg-soft); }
.icon-swatch.selected {

/* 토글 */

<script>
const ADMIN_TOKEN_KEY = 'admin_token';
let currentView = 'posts';
let pendingAction = null;

// ============================================================
// 인증
// ============================================================
function isLoggedIn() {
  return !!localStorage.getItem(ADMIN_TOKEN_KEY);
}

function getAuth() {
  return localStorage.getItem(ADMIN_TOKEN_KEY) || '';
}

async function login() {
  const password = document.getElementById('login-password').value;
  if (!password) return;

  try {
    const ok = await window.api.verifyAuth(password);
    if (ok) {
      localStorage.setItem(ADMIN_TOKEN_KEY, password);
      showApp();
    } else {
      showLoginError();
    }
  } catch (e) {
    console.error(e);
    showLoginError();
  }
}

function showLoginError() {
  const err = document.getElementById('login-error');
  err.style.display = 'block';
  setTimeout(() => err.style.display = 'none', 3000);
}

function logout() {
  localStorage.removeItem(ADMIN_TOKEN_KEY);
  location.reload();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  loadView();
}

// ============================================================
// 뷰 전환
// ============================================================
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`[data-view="${view}"]`).classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
  document.getElementById('view-' + view).style.display = 'block';
  loadView();
}

async function loadView() {
  if (currentView === 'posts') await loadPosts();
  else if (currentView === 'schedule') await loadSchedule();
  else if (currentView === 'materials') await loadMaterialsAdmin();
}

// ============================================================
// 공지 관리
// ============================================================
async function loadPosts() {
  const posts = await window.api.call('getPosts');
  document.getElementById('posts-count').textContent = `전체 ${posts.length}건`;
  
  if (posts.length === 0) {
    document.getElementById('posts-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
        </div>
        등록된 공지가 없습니다
      </div>
    `;
    return;
  }
  
  document.getElementById('posts-list').innerHTML = posts.map(p => `
    <div class="table-row">
      <div class="cell-tag">
        <span class="tag tag-${p.category}">${escapeHtml(p.category)}</span>
      </div>
      <div class="cell-title" title="${escapeHtml(p.title)}">${escapeHtml(p.title)}</div>
      <div class="cell-date">${formatDate(p.date)}</div>
      <div class="cell-actions">
        <button class="icon-btn" onclick="editPost('${p.id}')" title="편집">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn danger" onclick="confirmDeletePost('${p.id}', '${escapeHtml(p.title).replace(/'/g, "\\'")}')" title="삭제">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function openPostModal() {
  document.getElementById('post-modal-title').textContent = '새 공지 작성';
  document.getElementById('post-id').value = '';
  document.getElementById('post-category').value = '학사';
  document.getElementById('post-title').value = '';
  document.getElementById('post-content').value = '';
  document.getElementById('post-date').value = new Date().toISOString().split('T')[0];
  openModal('post-modal');
  setTimeout(() => document.getElementById('post-title').focus(), 100);
}

async function editPost(id) {
  const post = await window.api.call('getPost', { id });
  if (!post) return;
  document.getElementById('post-modal-title').textContent = '공지 편집';
  document.getElementById('post-id').value = post.id;
  document.getElementById('post-category').value = post.category;
  document.getElementById('post-title').value = post.title;
  document.getElementById('post-content').value = post.content;
  document.getElementById('post-date').value = post.date;
  openModal('post-modal');
}

async function savePost() {
  const data = {
    id: document.getElementById('post-id').value || undefined,
    category: document.getElementById('post-category').value,
    title: document.getElementById('post-title').value.trim(),
    content: document.getElementById('post-content').value.trim(),
    date: document.getElementById('post-date').value
  };
  
  if (!data.title) {
    toast('제목을 입력해주세요', 'error');
    return;
  }
  if (!data.date) {
    toast('날짜를 선택해주세요', 'error');
    return;
  }
  
  try {
    await window.api.call('savePost', data, getAuth());
    closeModal('post-modal');
    toast(data.id ? '공지가 수정되었습니다' : '새 공지가 등록되었습니다');
    await loadPosts();
  } catch (e) {
    toast('저장에 실패했습니다: ' + e.message, 'error');
  }
}

function confirmDeletePost(id, title) {
  document.getElementById('confirm-title').textContent = '공지 삭제';
  document.getElementById('confirm-text').textContent = `"${title}" 공지를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`;
  pendingAction = async () => {
    try {
      await window.api.call('deletePost', { id }, getAuth());
      toast('공지가 삭제되었습니다');
      await loadPosts();
    } catch (e) {
      toast('삭제에 실패했습니다', 'error');
    }
  };
  openModal('confirm-modal');
}

// ============================================================
// 일정 관리
// ============================================================
async function loadSchedule() {
  const schedule = await window.api.call('getSchedule');
  document.getElementById('schedule-count').textContent = `전체 ${schedule.length}건`;
  
  if (schedule.length === 0) {
    document.getElementById('schedule-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
        </div>
        등록된 일정이 없습니다
      </div>
    `;
    return;
  }
  
  document.getElementById('schedule-list').innerHTML = schedule.map(s => `
    <div class="table-row">
      <div class="cell-date">${formatScheduleDate(s.date)}</div>
      <div class="cell-tag">
        <span class="tag tag-${s.category}">${escapeHtml(s.category)}</span>
      </div>
      <div class="cell-title">
        ${escapeHtml(s.title)}
        ${s.description ? `<span style="color: var(--text-faint); font-weight: 400; margin-left: 8px;">${escapeHtml(s.description)}</span>` : ''}
      </div>
      <div class="cell-actions">
        <button class="icon-btn" onclick="editSchedule('${s.id}')" title="편집">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn danger" onclick="confirmDeleteSchedule('${s.id}', '${escapeHtml(s.title).replace(/'/g, "\\'")}')" title="삭제">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function openScheduleModal() {
  document.getElementById('schedule-modal-title').textContent = '새 일정 추가';
  document.getElementById('schedule-id').value = '';
  document.getElementById('schedule-category').value = '학사';
  document.getElementById('schedule-title').value = '';
  document.getElementById('schedule-description').value = '';
  document.getElementById('schedule-date').value = new Date().toISOString().split('T')[0];
  openModal('schedule-modal');
  setTimeout(() => document.getElementById('schedule-title').focus(), 100);
}

async function editSchedule(id) {
  const all = await window.api.call('getSchedule');
  const item = all.find(s => s.id === id);
  if (!item) return;
  document.getElementById('schedule-modal-title').textContent = '일정 편집';
  document.getElementById('schedule-id').value = item.id;
  document.getElementById('schedule-category').value = item.category;
  document.getElementById('schedule-title').value = item.title;
  document.getElementById('schedule-description').value = item.description || '';
  document.getElementById('schedule-date').value = item.date;
  openModal('schedule-modal');
}

async function saveSchedule() {
  const data = {
    id: document.getElementById('schedule-id').value || undefined,
    category: document.getElementById('schedule-category').value,
    title: document.getElementById('schedule-title').value.trim(),
    description: document.getElementById('schedule-description').value.trim(),
    date: document.getElementById('schedule-date').value
  };
  
  if (!data.title) {
    toast('제목을 입력해주세요', 'error');
    return;
  }
  if (!data.date) {
    toast('날짜를 선택해주세요', 'error');
    return;
  }
  
  try {
    await window.api.call('saveSchedule', data, getAuth());
    closeModal('schedule-modal');
    toast(data.id ? '일정이 수정되었습니다' : '새 일정이 추가되었습니다');
    await loadSchedule();
  } catch (e) {
    toast('저장에 실패했습니다: ' + e.message, 'error');
  }
}

function confirmDeleteSchedule(id, title) {
  document.getElementById('confirm-title').textContent = '일정 삭제';
  document.getElementById('confirm-text').textContent = `"${title}" 일정을 삭제하시겠습니까?`;
  pendingAction = async () => {
    try {
      await window.api.call('deleteSchedule', { id }, getAuth());
      toast('일정이 삭제되었습니다');
      await loadSchedule();
    } catch (e) {
      toast('삭제에 실패했습니다', 'error');
    }
  };
  openModal('confirm-modal');
}

function confirmAction() {
  if (pendingAction) {
    pendingAction();
    pendingAction = null;
  }
  closeModal('confirm-modal');
}

// ============================================================
// 모달 헬퍼
// ============================================================
function openModal(id) {
  document.getElementById(id).classList.add('active');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

// 모달 외부 클릭 시 닫기
document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', (e) => {
    if (e.target === el) el.classList.remove('active');
  });
});

// ESC 키로 모달 닫기
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-backdrop.active').forEach(m => m.classList.remove('active'));
  }
});

// 로그인 input Enter 처리
document.getElementById('login-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') login();
});

// ============================================================
// 토스트
// ============================================================
let toastTimer = null;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'error' ? 'var(--danger)' : 'var(--text)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ============================================================
// 유틸
// ============================================================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
}

function formatScheduleDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const days = ['일','월','화','수','목','금','토'];
  return `${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${days[d.getDay()]}`;
}

// ============================================================
// 시작
// ============================================================
// ============================================================
// 수업자료 관리
// ============================================================
let matState = {
  categories: [],
  selectedCategoryId: null,
  materials: [],
  editingSteps: [],
  uploadingStepIdx: null
};

async function loadMaterialsAdmin() {
  matState.categories = await window.api.call('getMaterialCategories', { includeHidden: true });
  renderMatTree();
  renderMatContent();
}

function renderMatTree() {
  const cats = matState.categories;
  const tops = cats.filter(c => !c.parentId);
  
  if (tops.length === 0) {
    document.getElementById('mat-tree-list').innerHTML = `
      <div class="mat-tree-empty">
        카테고리가 없습니다.<br>+ 버튼으로 추가하세요.
      </div>
    `;
    return;
  }
  
  const renderItem = (cat, depth = 0) => {
    const children = cats.filter(c => c.parentId === cat.id);
    const matCount = matState.materials && matState.selectedCategoryId === cat.id ? matState.materials.length : 0;
    const isActive = matState.selectedCategoryId === cat.id;
    const hidden = cat.hidden ? 'hidden-cat' : '';
    
    let html = `
      <div class="mat-tree-item ${isActive ? 'active' : ''} ${hidden}" onclick="selectCategory('${cat.id}')">
        <svg class="mat-tree-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${getCatIconSvgAdmin(cat.icon)}</svg>
        <span class="mat-tree-item-name">${escapeHtml(cat.name)}</span>
        ${cat.hidden ? '<span class="mat-tree-item-badge">숨김</span>' : ''}
        <div class="mat-tree-item-actions" onclick="event.stopPropagation()">
          <button class="mat-tree-item-act" onclick="editCategory('${cat.id}')" title="편집">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="mat-tree-item-act danger" onclick="confirmDeleteCategory('${cat.id}', '${escapeHtml(cat.name).replace(/'/g, "\\'")}')" title="삭제">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div>
      </div>
    `;
    
    if (children.length > 0) {
      html += `<div class="mat-tree-children">${children.map(c => renderItem(c, depth + 1)).join('')}</div>`;
    }
    return html;
  };
  
  document.getElementById('mat-tree-list').innerHTML = tops.map(t => renderItem(t)).join('');
}

function getCatIconSvgAdmin(iconName) {
  return ADMIN_CAT_ICONS[iconName] || ADMIN_CAT_ICONS['file'];
}

async function selectCategory(id) {
  const cat = matState.categories.find(c => c.id === id);
  if (!cat) return;
  matState.selectedCategoryId = id;
  
  // 하위 카테고리가 있으면 콘텐츠 영역에 안내 표시 (콘텐츠는 leaf 카테고리에만)
  const hasChildren = matState.categories.some(c => c.parentId === id);
  if (hasChildren) {
    matState.materials = [];
  } else {
    matState.materials = await window.api.call('getMaterials', { categoryId: id, includeHidden: true });
  }
  
  renderMatTree();
  renderMatContent();
}

function renderMatContent() {
  const id = matState.selectedCategoryId;
  if (!id) {
    document.getElementById('mat-content').innerHTML = `
      <div class="mat-content-empty">
        <div class="mat-content-empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        </div>
        좌측에서 카테고리를 선택하세요
      </div>
    `;
    return;
  }
  
  const cat = matState.categories.find(c => c.id === id);
  if (!cat) return;
  
  const hasChildren = matState.categories.some(c => c.parentId === id);
  
  if (hasChildren) {
    document.getElementById('mat-content').innerHTML = `
      <div class="mat-content-head">
        <div>
          <div class="mat-content-title">${escapeHtml(cat.name)}</div>
          <div class="mat-content-meta">
            상위 카테고리 · 하위 분류가 있습니다
            ${cat.hidden ? '<span class="mat-content-meta-hidden">숨김</span>' : ''}
          </div>
        </div>
      </div>
      <div class="mat-content-empty">
        이 카테고리는 하위 분류를 가지고 있습니다.<br>
        실제 자료는 좌측 트리의 하위 분류를 선택해 추가하세요.
      </div>
    `;
    return;
  }
  
  document.getElementById('mat-content').innerHTML = `
    <div class="mat-content-head">
      <div>
        <div class="mat-content-title">${escapeHtml(cat.name)}</div>
        <div class="mat-content-meta">
          전체 ${matState.materials.length}건
          ${cat.hidden ? '<span class="mat-content-meta-hidden">카테고리 숨김</span>' : ''}
        </div>
      </div>
      <button class="btn btn-primary" onclick="openMatModal()">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        새 자료 작성
      </button>
    </div>
    ${matState.materials.length === 0
      ? `<div class="mat-content-empty">아직 등록된 자료가 없습니다.<br>"새 자료 작성"으로 단계별 가이드를 작성해보세요.</div>`
      : matState.materials.map((m, i) => `
        <div class="mat-item-card ${m.hidden ? 'hidden-mat' : ''}">
          <div class="mat-item-num">${i + 1}</div>
          <div class="mat-item-content">
            <div class="mat-item-title">${escapeHtml(m.title)}${m.hidden ? ' <span style="color: var(--warning); font-size: 11px; font-weight: 600; margin-left: 6px;">[숨김]</span>' : ''}</div>
            <div class="mat-item-meta">${(m.steps || []).length}단계${m.description ? ' · ' + escapeHtml(m.description) : ''}</div>
          </div>
          <div class="mat-item-actions">
            <button class="icon-btn" onclick="editMaterial('${m.id}')" title="편집">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="icon-btn danger" onclick="confirmDeleteMaterial('${m.id}', '${escapeHtml(m.title).replace(/'/g, "\\'")}')" title="삭제">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
        </div>
      `).join('')
    }
  `;
}

// ===== 카테고리 모달 =====
function openCatModal() {
  document.getElementById('cat-modal-title').textContent = '카테고리 추가';
  document.getElementById('cat-id').value = '';
  document.getElementById('cat-name').value = '';
  document.getElementById('cat-hidden').checked = false;
  selectCatColor('6');
  selectCatIcon('file');
  populateCatParents();
  openModal('cat-modal');
  setTimeout(() => document.getElementById('cat-name').focus(), 100);
}

function editCategory(id) {
  const cat = matState.categories.find(c => c.id === id);
  if (!cat) return;
  document.getElementById('cat-modal-title').textContent = '카테고리 편집';
  document.getElementById('cat-id').value = cat.id;
  document.getElementById('cat-name').value = cat.name;
  document.getElementById('cat-hidden').checked = !!cat.hidden;
  selectCatColor(cat.color || '6');
  selectCatIcon(cat.icon || 'file');
  populateCatParents(cat.id);
  document.getElementById('cat-parent').value = cat.parentId || '';
  openModal('cat-modal');
}

function populateCatParents(excludeId) {
  // 자기 자신과 자기 자식들을 제외한 카테고리 목록 (최상위만 부모로 가능)
  const tops = matState.categories.filter(c => !c.parentId && c.id !== excludeId);
  const select = document.getElementById('cat-parent');
  select.innerHTML = '<option value="">없음 (최상위)</option>' + 
    tops.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
}

function selectCatColor(color) {
  document.getElementById('cat-color').value = color;
  document.querySelectorAll('#cat-color-picker .color-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === color);
  });
}

function selectCatIcon(icon) {
  document.getElementById('cat-icon').value = icon;
  document.querySelectorAll('#cat-icon-picker .icon-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.icon === icon);
  });
}

async function saveCatModal() {
  const id = document.getElementById('cat-id').value || undefined;
  const name = document.getElementById('cat-name').value.trim();
  const parentId = document.getElementById('cat-parent').value || null;
  const color = document.getElementById('cat-color').value;
  const icon = document.getElementById('cat-icon').value;
  const hidden = document.getElementById('cat-hidden').checked;
  
  if (!name) {
    toast('이름을 입력해주세요', 'error');
    return;
  }
  
  // 새 카테고리는 마지막 순서로
  let order;
  if (id) {
    const existing = matState.categories.find(c => c.id === id);
    order = existing ? existing.order : 0;
  } else {
    const siblings = matState.categories.filter(c => (c.parentId || null) === parentId);
    order = siblings.length;
  }
  
  try {
    await window.api.call('saveMaterialCategory', { id, name, parentId, color, icon, hidden, order }, getAuth());
    closeModal('cat-modal');
    toast(id ? '카테고리가 수정되었습니다' : '카테고리가 추가되었습니다');
    await loadMaterialsAdmin();
  } catch (e) {
    toast('저장 실패: ' + e.message, 'error');
  }
}

function confirmDeleteCategory(id, name) {
  const cat = matState.categories.find(c => c.id === id);
  const hasChildren = matState.categories.some(c => c.parentId === id);
  
  document.getElementById('confirm-title').textContent = '카테고리 삭제';
  document.getElementById('confirm-text').innerHTML = hasChildren 
    ? `"${name}"과 그 안의 <strong>모든 하위 분류 및 자료</strong>가 삭제됩니다. 되돌릴 수 없습니다.`
    : `"${name}"과 그 안의 모든 자료가 삭제됩니다. 되돌릴 수 없습니다.`;
  
  pendingAction = async () => {
    try {
      await window.api.call('deleteMaterialCategory', { id }, getAuth());
      if (matState.selectedCategoryId === id) matState.selectedCategoryId = null;
      toast('삭제되었습니다');
      await loadMaterialsAdmin();
    } catch (e) {
      toast('삭제 실패: ' + e.message, 'error');
    }
  };
  openModal('confirm-modal');
}

// ===== 자료(콘텐츠) 모달 =====
function openMatModal() {
  if (!matState.selectedCategoryId) return;
  document.getElementById('mat-modal-title').textContent = '새 자료 작성';
  document.getElementById('mat-id').value = '';
  document.getElementById('mat-categoryId').value = matState.selectedCategoryId;
  document.getElementById('mat-title').value = '';
  document.getElementById('mat-description').value = '';
  document.getElementById('mat-hidden').checked = false;
  matState.editingSteps = [{ title: '', content: '', imageUrl: '', imagePath: '' }];
  renderSteps();
  openModal('mat-modal');
  setTimeout(() => document.getElementById('mat-title').focus(), 100);
}

async function editMaterial(id) {
  const m = matState.materials.find(x => x.id === id);
  if (!m) return;
  document.getElementById('mat-modal-title').textContent = '자료 편집';
  document.getElementById('mat-id').value = m.id;
  document.getElementById('mat-categoryId').value = m.categoryId;
  document.getElementById('mat-title').value = m.title;
  document.getElementById('mat-description').value = m.description || '';
  document.getElementById('mat-hidden').checked = !!m.hidden;
  matState.editingSteps = (m.steps || []).map(s => ({ ...s }));
  if (matState.editingSteps.length === 0) matState.editingSteps.push({ title: '', content: '', imageUrl: '', imagePath: '' });
  renderSteps();
  openModal('mat-modal');
}

function renderSteps() {
  const html = matState.editingSteps.map((step, i) => `
    <div class="step-card">
      <div class="step-card-head">
        <div class="step-card-num">${i + 1}</div>
        <div style="font-size: 12px; color: var(--text-soft); flex: 1;">${i + 1}단계</div>
        <div class="step-card-actions">
          ${i > 0 ? `<button class="icon-btn" onclick="moveStep(${i}, -1)" title="위로">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
          </button>` : ''}
          ${i < matState.editingSteps.length - 1 ? `<button class="icon-btn" onclick="moveStep(${i}, 1)" title="아래로">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>` : ''}
          ${matState.editingSteps.length > 1 ? `<button class="icon-btn danger" onclick="removeStep(${i})" title="삭제">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>` : ''}
        </div>
      </div>
      <div class="form-row">
        <input type="text" class="form-input" placeholder="단계 제목" value="${escapeHtml(step.title || '')}" oninput="updateStepField(${i}, 'title', this.value)">
      </div>
      <div class="form-row" style="margin-bottom: 0;">
        <textarea class="form-textarea" placeholder="이 단계의 내용을 입력하세요" oninput="updateStepField(${i}, 'content', this.value)" style="min-height: 100px;">${escapeHtml(step.content || '')}</textarea>
      </div>
      ${step.imageUrl ? `
        <div class="step-image-preview">
          <img src="${escapeHtml(step.imageUrl)}" alt="">
          <button class="step-image-remove" onclick="removeStepImage(${i})" title="이미지 제거">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      ` : matState.uploadingStepIdx === i ? `
        <div class="step-uploading">
          <div class="spinner"></div>
          이미지 업로드 중...
        </div>
      ` : `
        <label class="step-image-uploader">
          <input type="file" accept="image/*" style="display: none;" onchange="uploadStepImage(${i}, this.files[0])">
          📷 이미지 첨부 (선택)
        </label>
      `}
    </div>
  `).join('');
  document.getElementById('steps-list').innerHTML = html;
}

function updateStepField(idx, field, value) {
  if (matState.editingSteps[idx]) {
    matState.editingSteps[idx][field] = value;
  }
}

function addStep() {
  matState.editingSteps.push({ title: '', content: '', imageUrl: '', imagePath: '' });
  renderSteps();
}

function removeStep(idx) {
  // 이미지가 있으면 Storage에서도 삭제 시도
  const step = matState.editingSteps[idx];
  if (step && step.imagePath) {
    window.api.deleteImage(step.imagePath).catch(() => {});
  }
  matState.editingSteps.splice(idx, 1);
  renderSteps();
}

function moveStep(idx, direction) {
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= matState.editingSteps.length) return;
  const tmp = matState.editingSteps[idx];
  matState.editingSteps[idx] = matState.editingSteps[newIdx];
  matState.editingSteps[newIdx] = tmp;
  renderSteps();
}

async function uploadStepImage(idx, file) {
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    toast('이미지는 5MB 이하만 가능합니다', 'error');
    return;
  }
  matState.uploadingStepIdx = idx;
  renderSteps();
  
  try {
    const result = await window.api.uploadImage(file, 'materials');
    matState.editingSteps[idx].imageUrl = result.url;
    matState.editingSteps[idx].imagePath = result.path;
    matState.uploadingStepIdx = null;
    renderSteps();
    toast('이미지가 업로드되었습니다');
  } catch (e) {
    matState.uploadingStepIdx = null;
    renderSteps();
    toast('업로드 실패: ' + e.message, 'error');
  }
}

async function removeStepImage(idx) {
  const step = matState.editingSteps[idx];
  if (step && step.imagePath) {
    await window.api.deleteImage(step.imagePath).catch(() => {});
  }
  matState.editingSteps[idx].imageUrl = '';
  matState.editingSteps[idx].imagePath = '';
  renderSteps();
}

async function saveMatModal() {
  const id = document.getElementById('mat-id').value || undefined;
  const categoryId = document.getElementById('mat-categoryId').value;
  const title = document.getElementById('mat-title').value.trim();
  const description = document.getElementById('mat-description').value.trim();
  const hidden = document.getElementById('mat-hidden').checked;
  const steps = matState.editingSteps.filter(s => (s.title || '').trim() || (s.content || '').trim() || s.imageUrl);
  
  if (!title) {
    toast('제목을 입력해주세요', 'error');
    return;
  }
  if (steps.length === 0) {
    toast('최소 한 단계는 작성해주세요', 'error');
    return;
  }
  
  let order;
  if (id) {
    const existing = matState.materials.find(m => m.id === id);
    order = existing ? existing.order : matState.materials.length;
  } else {
    order = matState.materials.length;
  }
  
  try {
    await window.api.call('saveMaterial', { 
      id, categoryId, title, description, hidden, steps, order 
    }, getAuth());
    closeModal('mat-modal');
    toast(id ? '자료가 수정되었습니다' : '자료가 등록되었습니다');
    await selectCategory(categoryId);
  } catch (e) {
    toast('저장 실패: ' + e.message, 'error');
  }
}

function confirmDeleteMaterial(id, title) {
  document.getElementById('confirm-title').textContent = '자료 삭제';
  document.getElementById('confirm-text').textContent = `"${title}" 자료를 삭제하시겠습니까? 첨부된 이미지도 함께 삭제됩니다.`;
  pendingAction = async () => {
    try {
      // 이미지 먼저 정리
      const m = matState.materials.find(x => x.id === id);
      if (m && m.steps) {
        for (const step of m.steps) {
          if (step.imagePath) {
            await window.api.deleteImage(step.imagePath).catch(() => {});
          }
        }
      }
      await window.api.call('deleteMaterial', { id }, getAuth());
      toast('삭제되었습니다');
      await selectCategory(matState.selectedCategoryId);
    } catch (e) {
      toast('삭제 실패: ' + e.message, 'error');
    }
  };
  openModal('confirm-modal');
}

document.addEventListener('DOMContentLoaded', () => {
  if (isLoggedIn()) {
    showApp();
  } else {
    document.getElementById('login-password').focus();
  }
});
</script>

</body>
