<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fafaf7">
<title>SBS 아카데미 수강생 안내</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --bg: #fafaf7;
  --bg-elevated: #ffffff;
  --bg-soft: #efeee8;
  --bg-section: #f4f3ed;
  
  --text: #111111;
  --text-mid: #2d2d2d;
  --text-soft: #4a4a4a;
  --text-faint: #777777;
  
  --border: rgba(0, 0, 0, 0.07);
  --border-mid: rgba(0, 0, 0, 0.12);
  --border-strong: rgba(0, 0, 0, 0.18);
  
  --accent: #1e3a5f;
  --accent-soft: #e8eef5;
  --accent-deep: #14283f;
  
  --danger: #c8323a;
  --danger-bg: #fce8e9;
  --warning: #b45309;
  --warning-bg: #fef3e0;
  --notice: #fdf6e3;
  --notice-text: #4a3416;
  --notice-strong: #2a1d0c;
  --notice-label: #92400e;
  
  --m-1: #5b21b6; --m-1-bg: #ede9fe;
  --m-2: #047857; --m-2-bg: #d1fae5;
  --m-3: #b45309; --m-3-bg: #fef3c7;
  --m-4: #1d4ed8; --m-4-bg: #dbeafe;
  --m-5: #be185d; --m-5-bg: #fce7f3;
  
  --shadow-xs: 0 1px 1px rgba(0,0,0,0.03);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);

  --safe-top: env(safe-area-inset-top, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.014em;
}

body {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: calc(64px + var(--safe-bottom));
  background: var(--bg);
}

button { font-family: inherit; cursor: pointer; }

/* ===== 헤더 ===== */
.header {
  position: sticky;
  top: 0;
  background: rgba(250, 250, 247, 0.94);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  padding: calc(12px + var(--safe-top)) 16px 11px;
  border-bottom: 0.5px solid var(--border);
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-brand { display: flex; align-items: center; gap: 9px; }
.header-logo {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 11.5px;
  font-weight: 600;
}
.header-text { line-height: 1.2; }
.header-title {
  font-size: 11px;
  color: var(--text-soft);
  font-weight: 500;
}
.header-page {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.025em;
  margin-top: 1px;
}
.header-actions { display: flex; gap: 4px; }
.header-btn {
  position: relative;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-elevated);
  display: flex; align-items: center; justify-content: center;
  border: 0.5px solid var(--border-mid);
  color: var(--text-soft);
}
.header-btn:active { transform: scale(0.95); }
.header-btn-dot {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--danger);
  border: 1.5px solid var(--bg);
  border-radius: 50%;
  top: 4px; right: 4px;
}

/* ===== 페이지 ===== */
.page { padding: 0; }
.page.hidden { display: none; }
.page-content { padding: 12px 14px 18px; }

/* ===== 안내사항 라인 ===== */
.notice-bar {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 10px 14px;
  background: var(--notice);
  border-bottom: 0.5px solid #f0e6c8;
}
.notice-icon {
  width: 13px; height: 13px;
  flex-shrink: 0;
  margin-top: 1px;
  color: var(--notice-label);
}
.notice-content { flex: 1; min-width: 0; }
.notice-label {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--notice-label);
  letter-spacing: 0.04em;
  margin-bottom: 3px;
}
.notice-text {
  font-size: 12px;
  color: var(--notice-text);
  line-height: 1.6;
  letter-spacing: -0.012em;
  word-break: keep-all;
  white-space: pre-wrap;
}
.notice-text b { font-weight: 600; color: var(--notice-strong); }

/* ===== 요약 영역 ===== */
.summary {
  padding: 12px 14px;
  border-bottom: 0.5px solid var(--border);
}
.day-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 11px;
}
.day-num {
  font-size: 21px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1;
}
.day-label {
  font-size: 11.5px;
  color: var(--text-soft);
  font-weight: 500;
}

.gauge-card {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 11px;
  margin-bottom: 6px;
  box-shadow: var(--shadow-xs);
}
.gauge-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 6px;
}
.gauge-name {
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: -0.012em;
}
.gauge-pct {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.gauge-pct.danger { color: var(--danger); }
.gauge-bar {
  height: 5px;
  background: rgba(0,0,0,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.gauge-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.5s ease;
}
.gauge-meta {
  display: flex;
  justify-content: space-between;
  font-size: 10.5px;
  color: var(--text-faint);
  margin-top: 5px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

.stat-row {
  display: flex;
  gap: 6px;
}
.stat {
  flex: 1;
  background: var(--bg-elevated);
  border-radius: 8px;
  padding: 8px 10px;
  border: 0.5px solid var(--border);
  box-shadow: var(--shadow-xs);
}
.stat-num {
  font-size: 15.5px;
  font-weight: 600;
  letter-spacing: -0.022em;
  color: var(--accent);
  line-height: 1.1;
}
.stat-num small {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--text-faint);
  margin-left: 2px;
}
.stat-label {
  font-size: 10.5px;
  color: var(--text-soft);
  margin-top: 3px;
  font-weight: 500;
}

/* ===== 메뉴 (5칸 한 줄) ===== */
.menu5 {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 14px 12px 6px;
}

/* ===== 새 홈 메뉴 그리드 (hm-grid) - 2x2 카드 + 미리보기 ===== */
.hm-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 14px 12px 6px;
}
.hm-card {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 13px 12px 12px;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.15s;
  box-shadow: var(--shadow-xs);
  font-family: inherit;
  text-align: left;
  display: flex;
  flex-direction: column;
  min-height: 130px;
}
.hm-card:active {
  transform: scale(0.985);
  box-shadow: var(--shadow-sm);
}
.hm-head {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 10px;
}
.hm-icon-wrap {
  width: 34px; height: 34px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.hm-icon-wrap svg {
  width: 17px; height: 17px;
}
/* 진한 색상 톤 - 시인성 ↑ */
.hm-icon-wrap.cal { background: #e9e3f9; color: #5b3aa3; }
.hm-icon-wrap.book { background: #d4f0e0; color: #047857; }
.hm-icon-wrap.zoom { background: #ffeacc; color: #b85a00; }
.hm-icon-wrap.users { background: #fbe1eb; color: #b21f5b; }

.hm-name {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -0.018em;
  color: var(--text);
}
.hm-divider {
  height: 0.5px;
  background: rgba(0,0,0,0.06);
  margin-bottom: 9px;
}
.hm-items {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1;
}
.hm-item {
  font-size: 11px;
  color: var(--text-soft);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 5px;
  letter-spacing: -0.012em;
}
.hm-item .dot {
  display: inline-block;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #b5b5b5;
  flex-shrink: 0;
}
.hm-empty {
  font-size: 10.5px;
  color: var(--text-faint);
  font-weight: 500;
  font-style: italic;
}
.hm-more {
  font-size: 10px;
  color: var(--text-faint);
  font-weight: 600;
  margin-top: 1px;
  padding-left: 9px;
}

.menu-item {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 13px 2px 11px;
  text-align: center;
  min-width: 0;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.15s;
  box-shadow: var(--shadow-xs);
  font-family: inherit;
}
.menu-item:active {
  transform: scale(0.94);
  box-shadow: var(--shadow-sm);
}
.menu-icon-wrap {
  width: 38px; height: 38px;
  border-radius: 11px;
  margin: 0 auto 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.menu-icon { width: 19px; height: 19px; stroke-width: 2; }
.menu-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  letter-spacing: -0.025em;
  min-height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.menu-item[data-color="1"] .menu-icon-wrap { background: var(--m-1-bg); }
.menu-item[data-color="1"] .menu-icon { color: var(--m-1); }
.menu-item[data-color="2"] .menu-icon-wrap { background: var(--m-2-bg); }
.menu-item[data-color="2"] .menu-icon { color: var(--m-2); }
.menu-item[data-color="3"] .menu-icon-wrap { background: var(--m-3-bg); }
.menu-item[data-color="3"] .menu-icon { color: var(--m-3); }
.menu-item[data-color="4"] .menu-icon-wrap { background: var(--m-4-bg); }
.menu-item[data-color="4"] .menu-icon { color: var(--m-4); }
.menu-item[data-color="5"] .menu-icon-wrap { background: var(--m-5-bg); }
.menu-item[data-color="5"] .menu-icon { color: var(--m-5); }

/* ===== 섹션 ===== */
.section {
  padding: 13px 14px 4px;
}
.section-h {
  display: flex;
  align-items: baseline;
  margin-bottom: 7px;
  gap: 8px;
}
.section-t {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.018em;
}
.section-meta {
  font-size: 10.5px;
  color: var(--text-faint);
  font-weight: 500;
}
.section-link {
  margin-left: auto;
  font-size: 10.5px;
  color: var(--accent);
  font-weight: 600;
  background: none;
  border: none;
  padding: 4px 6px;
  border-radius: 4px;
  font-family: inherit;
}
.section-link:active { background: var(--bg-soft); }

/* ===== 일정 행 ===== */
.event {
  display: flex;
  align-items: center;
  padding: 7px 0;
  gap: 9px;
  border-bottom: 0.5px solid rgba(0,0,0,0.05);
  cursor: pointer;
}
.event:last-child { border-bottom: none; }
.event-date {
  font-size: 11.5px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  min-width: 38px;
}
.event-day {
  font-size: 11px;
  color: var(--text-faint);
  font-weight: 500;
  flex-shrink: 0;
}
.event-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.event-title {
  font-size: 12.5px;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 500;
}
.event-dday {
  font-size: 11px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  color: var(--text-faint);
}
.event-dday.urgent { color: var(--danger); }

/* ===== 공지 행 ===== */
.post {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 8px 0;
  border-bottom: 0.5px solid rgba(0,0,0,0.05);
  cursor: pointer;
  transition: opacity 0.15s;
}
.post:last-child { border-bottom: none; }
.post.read { opacity: 0.55; }
.post-tag {
  font-size: 10.5px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 1px;
}
.post-body { flex: 1; min-width: 0; }
.post-thumb {
  width: 56px;
  height: 56px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  border: 0.5px solid var(--border);
  background: var(--bg-soft);
}
.detail-image {
  margin: 6px 0 16px;
  border-radius: 12px;
  overflow: hidden;
  border: 0.5px solid var(--border);
  background: var(--bg-soft);
}
.detail-image img {
  display: block;
  width: 100%;
  height: auto;
  max-height: 400px;
  object-fit: cover;
}
.post-title {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: -0.012em;
  line-height: 1.4;
}
.post-meta {
  font-size: 10.5px;
  color: var(--text-faint);
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}
.post-new {
  font-size: 10px;
  background: var(--danger);
  color: #fff;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.tag-학사 { background: #fce8e9; color: #8a1c23; }
.tag-세미나 { background: #ebe9fc; color: #3a2e8a; }
.tag-특강 { background: #ebe9fc; color: #3a2e8a; }
.tag-시설 { background: #ddf3eb; color: #084d3a; }
.tag-평가 { background: #fbecd5; color: #683800; }
.tag-이벤트 { background: #fce8e9; color: #8a1c23; }
.tag-취업 { background: #dfeefa; color: #154d92; }
.tag-기타 { background: #ebe9e3; color: #3d3d38; }

/* ===== 빈 상태 ===== */
.empty {
  text-align: center;
  padding: 38px 16px;
  color: var(--text-faint);
  font-size: 12px;
}
.empty-icon {
  width: 32px; height: 32px;
  margin: 0 auto 8px;
  background: var(--bg-soft);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== 상세 페이지 ===== */
.detail-back {
  background: none; border: none;
  font-size: 12.5px;
  color: var(--text-mid);
  padding: 6px 8px 6px 0;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 3px;
  font-family: inherit;
  font-weight: 500;
}
.detail-title {
  font-size: 19.5px;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.3;
  margin: 4px 0 10px;
  padding-right: 32px;
}
.detail-title-wrap { position: relative; }
.detail-bookmark {
  position: absolute;
  top: 0; right: 0;
  width: 30px; height: 30px;
  border-radius: 6px;
  background: none;
  border: none;
  color: var(--text-faint);
  display: flex;
  align-items: center;
  justify-content: center;
}
.detail-bookmark.active { color: #d97706; }
.detail-bookmark.active svg { fill: #d97706; }
.detail-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 0.5px solid var(--border);
}
.detail-content {
  font-size: 13px;
  line-height: 1.85;
  white-space: pre-wrap;
  word-break: keep-all;
  color: var(--text-mid);
}
.detail-content a {
  color: var(--accent);
  text-decoration: underline;
}

/* ===== 카테고리 필터 ===== */
.filter-bar {
  display: flex; gap: 5px;
  overflow-x: auto;
  margin-bottom: 12px;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  padding: 6px 12px;
  border: 0.5px solid var(--border-mid);
  border-radius: 16px;
  background: var(--bg-elevated);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-mid);
  font-weight: 500;
}
.filter-chip:active { background: var(--bg-soft); }
.filter-chip.active {
  background: var(--text);
  color: var(--bg-elevated);
  border-color: var(--text);
  font-weight: 600;
}

/* ===== 검색 ===== */
.search-bar {
  display: flex;
  align-items: center;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border-mid);
  border-radius: 10px;
  padding: 0 12px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-xs);
}
.search-bar:focus-within { border-color: var(--accent); }
.search-input {
  flex: 1;
  padding: 9px 8px;
  border: none;
  background: none;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  color: var(--text);
}
.search-clear {
  background: none;
  border: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
}
.search-highlight {
  background: #fef3c7;
  color: #78350f;
  padding: 0 2px;
  border-radius: 2px;
  font-weight: 600;
}

/* ===== 캘린더 ===== */
.cal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding: 0 2px;
}
.cal-month {
  font-size: 16.5px;
  font-weight: 700;
  letter-spacing: -0.025em;
}
.cal-nav { display: flex; gap: 4px; align-items: center; }
.cal-nav-btn {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-mid);
}
.cal-today-btn {
  padding: 0 10px;
  height: 28px;
  border-radius: 7px;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border-mid);
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text-mid);
  font-family: inherit;
}
.cal-grid {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.cal-week-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--bg-section);
  border-bottom: 0.5px solid var(--border);
}
.cal-week-day {
  padding: 6px 0;
  text-align: center;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text-soft);
}
.cal-week-day.sun { color: var(--danger); }
.cal-week-day.sat { color: #1d4ed8; }
.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.cal-day {
  aspect-ratio: 1;
  border-right: 0.5px solid var(--border);
  border-bottom: 0.5px solid var(--border);
  padding: 4px 3px 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  position: relative;
  min-height: 44px;
}
.cal-day:nth-child(7n) { border-right: none; }
.cal-day:active { background: var(--bg-section); }

/* 다른 달 (수업일정 없을 때) */
.cal-day.other-month { color: var(--text-faint); background: rgba(0, 0, 0, 0.015); }

/* 수업일정 외부의 다른 달은 빈 칸 */
.cal-day.cal-day-empty {
  background: transparent;
  cursor: default;
  pointer-events: none;
  border-color: transparent;
}

/* 수업일정 기간 외 (같은 달이지만 활성기간 아님) */
.cal-day.out-range {
  background: rgba(0, 0, 0, 0.02);
  cursor: default;
}
.cal-day.out-range .cal-day-num { color: #c5c5c5; }
.cal-day.out-range.sun .cal-day-num,
.cal-day.out-range.sat .cal-day-num { color: #c5c5c5; opacity: 0.7; }

/* 지나간 수업일 (오늘 이전) - 살짝 회색 */
.cal-day.past { opacity: 0.45; }
.cal-day.past.in-range::before { opacity: 0.6; }

/* 선택된 날짜 */
.cal-day.selected { background: var(--accent-soft); }

/* 오늘 - 빨간 원 → 하늘색 배경 */
.cal-day.today {
  background: #dbeafe;
}
.cal-day.today .cal-day-num {
  color: #1d4ed8;
  font-weight: 700;
}
.cal-day.today.selected {
  background: #c7dafc;
}

.cal-day-num {
  font-size: 12.5px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.cal-day.other-month .cal-day-num { color: var(--text-faint); }
.cal-day.sun .cal-day-num { color: var(--danger); }
.cal-day.sat .cal-day-num { color: #1d4ed8; }
.cal-day.other-month.sun .cal-day-num,
.cal-day.other-month.sat .cal-day-num { opacity: 0.5; }
.cal-events {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 3px;
  margin-top: 3px;
  width: 100%;
  flex-wrap: wrap;
}
.cal-event-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.cal-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
}
.cal-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-mid);
  font-weight: 500;
}
.cal-legend-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* 수업일정 정보 배너 */
.cal-course-banner {
  background: var(--accent-soft);
  border: 0.5px solid rgba(30, 58, 95, 0.2);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 8px;
}
.cal-course-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.018em;
}
.cal-course-period {
  font-size: 11px;
  color: var(--accent);
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
  opacity: 0.8;
}
.cal-course-cancel {
  font-size: 11px;
  color: #be185d;
  margin-top: 4px;
  padding-top: 4px;
  border-top: 0.5px dashed rgba(190, 24, 93, 0.25);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  word-break: keep-all;
  line-height: 1.5;
}

/* 기간 표시 띠 (in-range) */
.cal-day.in-range::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  bottom: 0;
  height: 3px;
  background: #047857;
  z-index: 1;
}
/* 시작일: 띠가 30%부터 시작 (왼쪽 비움) */
.cal-day.start-day::before {
  left: 30%;
}
/* 종강일: 띠가 70%까지만 (오른쪽 비움) */
.cal-day.end-day::before {
  right: 30%;
}
/* 시작일/종강일 글자 표시 */
.cal-day.start-day::after,
.cal-day.end-day::after {
  position: absolute;
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: 0.02em;
  bottom: 5px;
  z-index: 2;
}
.cal-day.start-day::after {
  content: '개강';
  left: 4px;
  color: #047857;
}
.cal-day.end-day::after {
  content: '종강';
  right: 4px;
  color: #be185d;
}
.cal-day.end-day::before {
  background: #be185d;
}

.cal-selected-day { margin-top: 14px; }
.cal-selected-title {
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 8px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cal-selected-title-date {
  font-size: 15.5px;
  font-weight: 700;
}
.cal-selected-title-day {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-soft);
}
.cal-selected-title-today {
  font-size: 10.5px;
  background: #1d4ed8;
  color: #fff;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 700;
}

/* ===== 리스트 카드 ===== */
.list-card {
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
  background: var(--bg-elevated);
  box-shadow: var(--shadow-xs);
}
.list-card-title {
  font-size: 14.5px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: -0.018em;
}
.list-card-meta {
  font-size: 11.5px;
  color: var(--text-soft);
  margin-bottom: 6px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 5px;
}
.list-card-desc {
  font-size: 12.5px;
  color: var(--text-soft);
  line-height: 1.55;
}
.program-chips {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 0.5px dashed var(--border-mid);
}
.program-chip {
  font-size: 11px;
  padding: 3px 8px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 6px;
  font-weight: 600;
}

/* 수강생 비대면 카드 (펼침/접힘) */
.cls-card {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 11px;
  margin-bottom: 8px;
  overflow: hidden;
  box-shadow: var(--shadow-xs);
  transition: box-shadow 0.15s;
}
.cls-card.open { box-shadow: var(--shadow-sm); }
.cls-card-head {
  padding: 13px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  gap: 10px;
}
.cls-name-wrap {
  display: flex;
  align-items: center;
  gap: 9px;
  flex: 1;
  min-width: 0;
}
.cls-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--accent-soft);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.cls-card-info { flex: 1; min-width: 0; }
.cls-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.018em;
}
.cls-prog-count {
  font-size: 10.5px;
  color: var(--text-faint);
  margin-top: 2px;
  font-weight: 500;
}
.cls-chevron {
  width: 22px; height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.cls-card.open .cls-chevron {
  transform: rotate(180deg);
  color: var(--accent);
}
.cls-card-body {
  display: none;
  border-top: 0.5px solid var(--border);
  padding: 14px;
  background: var(--bg-section);
}
.cls-card.open .cls-card-body { display: block; }

.cls-info-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 11px;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  margin-bottom: 6px;
}
.cls-info-label {
  font-size: 9.5px;
  color: var(--text-soft);
  font-weight: 600;
  letter-spacing: 0.04em;
  flex-shrink: 0;
  min-width: 56px;
}
.cls-info-value {
  flex: 1;
  font-size: 12.5px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  font-family: 'SF Mono', Menlo, Consolas, monospace;
  word-break: break-all;
}
.cls-copy-btn {
  background: var(--bg-section);
  border: 0.5px solid var(--border-mid);
  width: 26px; height: 26px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-soft);
  flex-shrink: 0;
  font-family: inherit;
  transition: background 0.12s, color 0.12s;
}
.cls-copy-btn:active { transform: scale(0.94); }
.cls-progs-title {
  font-size: 9.5px;
  color: var(--text-soft);
  font-weight: 600;
  letter-spacing: 0.04em;
  margin-top: 12px;
  margin-bottom: 6px;
  padding: 0 2px;
}
.cls-progs {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.cls-prog-chip {
  font-size: 10.5px;
  padding: 3px 8px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 5px;
  font-weight: 600;
}

/* 참여 링크 버튼 (공지/세미나 상세) */
.detail-link-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  width: 100%;
  background: var(--accent);
  color: #fff;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  text-decoration: none;
  margin: 12px 0 4px;
  border: none;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.12s, transform 0.1s;
  box-shadow: var(--shadow-xs);
}
.detail-link-btn:active { transform: scale(0.99); }
.detail-link-btn:hover { background: var(--accent-deep); }

/* 줌 가이드 버튼 */
.zoom-guide-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  padding: 12px 14px;
  border-radius: 11px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  box-shadow: var(--shadow-xs);
  transition: background 0.12s;
}
.zoom-guide-btn:active { background: var(--bg-section); }
.zoom-guide-btn-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--accent-soft);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.zoom-guide-btn-text { flex: 1; min-width: 0; }
.zoom-guide-btn-title { font-size: 13px; font-weight: 700; letter-spacing: -0.018em; }
.zoom-guide-btn-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; font-weight: 500; }
.zoom-guide-btn-arrow { color: var(--text-faint); flex-shrink: 0; }

/* 인앱 브라우저 안내 배너 (상단 고정) */
.inapp-banner {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 999;
  background: #1e3a5f;
  color: #fff;
  padding: 10px 12px;
  padding-top: max(10px, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  gap: 9px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
  transform: translateY(-100%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: inherit;
}
.inapp-banner.show { transform: translateY(0); }
.inapp-banner-icon {
  flex-shrink: 0;
  color: #fcd34d;
}
.inapp-banner-text {
  flex: 1;
  min-width: 0;
}
.inapp-banner-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: -0.018em;
  color: #fff;
}
.inapp-banner-sub {
  font-size: 10.5px;
  color: rgba(255, 255, 255, 0.75);
  margin-top: 1px;
  font-weight: 500;
}
.inapp-banner-open {
  background: #fff;
  color: #1e3a5f;
  border: none;
  padding: 7px 11px;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  font-family: inherit;
  letter-spacing: -0.012em;
  white-space: nowrap;
}
.inapp-banner-open:active { transform: scale(0.95); }
.inapp-banner-close {
  background: transparent;
  border: none;
  color: rgba(255, 255, 255, 0.7);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 19px;
  line-height: 1;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}
.inapp-banner-close:active { background: rgba(255, 255, 255, 0.15); }

/* 줌 가이드 배너 (이미지 자체) */
.zoom-guide-banner {
  position: relative;
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 12px;
  cursor: pointer;
  background: var(--bg-section);
  border: 0.5px solid var(--border);
  box-shadow: var(--shadow-xs);
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  transition: transform 0.1s;
}
.zoom-guide-banner:active { transform: scale(0.99); }
.zoom-guide-banner img {
  display: block;
  width: 100%;
  height: auto;
  -webkit-user-drag: none;
  pointer-events: none;
}
.zoom-guide-hint {
  position: absolute;
  right: 8px;
  bottom: 8px;
  background: rgba(0, 0, 0, 0.65);
  color: #fff;
  font-size: 10.5px;
  font-weight: 600;
  padding: 4px 9px;
  border-radius: 100px;
  letter-spacing: -0.012em;
  pointer-events: none;
  backdrop-filter: blur(4px);
}

/* 이미지 풀스크린 모달 */
.image-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.92);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  cursor: zoom-out;
  overflow: auto;
}
.image-modal.active { display: flex; }
.image-modal img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 8px;
  display: block;
}
.image-modal-close {
  position: fixed;
  top: 12px;
  right: 12px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  border: none;
  color: #fff;
  font-size: 24px;
  cursor: pointer;
  z-index: 1001;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  line-height: 1;
}

/* 세미나 카드 */
.seminar-card {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 0;
  margin-bottom: 10px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow-xs);
  transition: transform 0.12s, box-shadow 0.15s;
}
.seminar-card:active { transform: scale(0.99); box-shadow: var(--shadow-sm); }
.seminar-card-img {
  width: 100%;
  height: auto;
  max-height: 480px;
  background: var(--bg-soft);
  display: block;
  object-fit: contain;
}
.seminar-card-body { padding: 13px 14px; }
.seminar-card-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.018em;
  line-height: 1.4;
}
.seminar-card-meta {
  font-size: 11.5px;
  color: var(--text-soft);
  margin-top: 5px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}
.seminar-card-meta b {
  color: var(--text);
  font-weight: 700;
}
.seminar-card-link {
  font-size: 10.5px;
  background: #ebe9fc;
  color: #3a2e8a;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 700;
  margin-left: 6px;
}

/* 세미나 상세 - 원본 비율 유지 이미지 */
.seminar-detail-image {
  margin: 8px 0 4px;
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg-soft);
  border: 0.5px solid var(--border);
  cursor: zoom-in;
}
.seminar-detail-image img {
  display: block;
  width: 100%;
  height: auto;
  object-fit: contain;
}

/* 세미나 정보 표 */
.seminar-info-grid {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 11px;
  padding: 4px 12px;
  margin-top: 4px;
  box-shadow: var(--shadow-xs);
}
.seminar-info-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 0.5px solid var(--border);
}
.seminar-info-row:last-child { border-bottom: none; }
.seminar-info-label {
  font-size: 11.5px;
  color: var(--text-faint);
  font-weight: 600;
  flex-shrink: 0;
  width: 72px;
  padding-top: 1px;
}
.seminar-info-value {
  font-size: 12.5px;
  color: var(--text);
  font-weight: 500;
  flex: 1;
  line-height: 1.5;
  word-break: keep-all;
}

/* 홈 세미나 자동 슬라이드 캐러셀 */
.seminar-carousel-wrap {
  margin: 18px -16px 16px;
  padding: 0;
  overflow: hidden;
  position: relative;
  -webkit-mask-image: linear-gradient(to right, transparent, #000 6%, #000 94%, transparent);
  mask-image: linear-gradient(to right, transparent, #000 6%, #000 94%, transparent);
}
.seminar-carousel-track-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: -0.018em;
  color: var(--text-soft);
  padding: 0 16px;
  margin-bottom: 10px;
}
.seminar-carousel-track {
  display: flex;
  gap: 10px;
  width: max-content;
  padding: 0 6px;
  animation: seminarMarquee 28s linear infinite;
}
.seminar-carousel-wrap:hover .seminar-carousel-track,
.seminar-carousel-wrap:focus-within .seminar-carousel-track {
  animation-play-state: paused;
}
@keyframes seminarMarquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
.seminar-carousel-item {
  flex: 0 0 auto;
  width: 200px;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 11px;
  overflow: hidden;
  box-shadow: var(--shadow-xs);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex;
  flex-direction: column;
}
.seminar-carousel-item:active { transform: scale(0.98); }
.seminar-carousel-item:hover { box-shadow: var(--shadow-sm); }
.seminar-carousel-imgwrap {
  width: 100%;
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.seminar-carousel-img {
  display: block;
  width: 100%;
  height: auto;
  max-height: 260px;
  object-fit: contain;
}
.seminar-carousel-noimg {
  width: 100%;
  aspect-ratio: 4 / 3;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 10px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: -0.018em;
  line-height: 1.4;
}
.seminar-carousel-info {
  padding: 9px 11px 11px;
}
.seminar-carousel-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: -0.018em;
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.seminar-carousel-meta {
  font-size: 10px;

}

/* ===== 학칙 (이용안내) ===== */
.accordion {
  border: 0.5px solid var(--border);
  border-radius: 11px;
  margin-bottom: 6px;
  overflow: hidden;
  background: var(--bg-elevated);
}
.accordion-head {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-elevated);
  border: none;
  text-align: left;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: inherit;
}
.accordion-num {
  display: inline-block;
  width: 18px; height: 18px;
  background: var(--bg-section);
  border-radius: 5px;
  font-size: 10.5px;
  font-weight: 700;
  color: var(--text-mid);
  text-align: center;
  line-height: 18px;
  margin-right: 8px;
}
.accordion.open .accordion-num {
  background: var(--accent);
  color: #fff;
}
.accordion-icon {
  transition: transform 0.2s;
  color: var(--text-faint);
}
.accordion.open .accordion-icon { transform: rotate(180deg); color: var(--accent); }
.accordion-body {
  display: none;
  padding: 10px 14px 14px;
  font-size: 12.5px;
  color: var(--text-mid);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: keep-all;
  border-top: 0.5px solid var(--border);
}
.accordion.open .accordion-body { display: block; }

/* ===== 수업안내 (수업자료) ===== */
.material-cat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.material-cat-card {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 12px;
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  box-shadow: var(--shadow-xs);
  display: flex;
  flex-direction: column;
  gap: 9px;
  min-height: 90px;
}
.material-cat-card:active { transform: scale(0.97); }
.material-cat-icon-wrap {
  width: 36px; height: 36px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.material-cat-icon { width: 18px; height: 18px; stroke-width: 2; }
.material-cat-name {
  font-size: 13.5px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.material-cat-meta {
  font-size: 11px;
  color: var(--text-faint);
  font-weight: 500;
  margin-top: -6px;
}
.material-cat-card[data-color="1"] .material-cat-icon-wrap { background: var(--m-1-bg); }
.material-cat-card[data-color="1"] .material-cat-icon { color: var(--m-1); }
.material-cat-card[data-color="2"] .material-cat-icon-wrap { background: var(--m-2-bg); }
.material-cat-card[data-color="2"] .material-cat-icon { color: var(--m-2); }
.material-cat-card[data-color="3"] .material-cat-icon-wrap { background: var(--m-3-bg); }
.material-cat-card[data-color="3"] .material-cat-icon { color: var(--m-3); }
.material-cat-card[data-color="4"] .material-cat-icon-wrap { background: var(--m-4-bg); }
.material-cat-card[data-color="4"] .material-cat-icon { color: var(--m-4); }
.material-cat-card[data-color="5"] .material-cat-icon-wrap { background: var(--m-5-bg); }
.material-cat-card[data-color="5"] .material-cat-icon { color: var(--m-5); }
.material-cat-card[data-color="6"] .material-cat-icon-wrap { background: #e2e8f0; }
.material-cat-card[data-color="6"] .material-cat-icon { color: #475569; }

.material-card {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 11px;
  padding: 12px 13px;
  margin-bottom: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
}
.material-card-num {
  width: 24px; height: 24px;
  border-radius: 6px;

  align-items: center;
  justify-content: center;

  font-weight: 700;
  flex-shrink: 0;
}

  font-size: 13px;
  font-weight: 600;
}
.material-card-desc {
  font-size: 11.5px;
  color: var(--text-soft);
  margin-top: 2px;
}
.material-card-meta {
  font-size: 10.5px;
  color: var(--text-faint);
  margin-top: 2px;
  font-weight: 500;
}

/* 수업안내 - 단계별 가이드 */

}

  color: var(--text-faint);
  margin-bottom: 6px;
  font-weight: 500;
}
.material-detail-title {
  font-size: 21px;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.3;
  margin-bottom: 6px;
}
.material-detail-desc {
  font-size: 13px;
  color: var(--text-soft);
  line-height: 1.55;
}
.material-step {
  margin-bottom: 22px;
  position: relative;
}
.material-step-head {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 10px;
}
.material-step-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11.5px;
  font-weight: 700;
  flex-shrink: 0;
}
.material-step-title {
  font-size: 14.5px;
  font-weight: 700;
  letter-spacing: -0.022em;
  line-height: 1.35;
}
.material-step-content {
  font-size: 13px;
  line-height: 1.75;
  color: var(--text-mid);
  white-space: pre-wrap;
  word-break: keep-all;
  padding-left: 31px;
}
.material-step-image {
  margin-top: 10px;
  margin-left: 31px;
  border-radius: 8px;
  overflow: hidden;
  border: 0.5px solid var(--border);
}
.material-step-image img {
  display: block;
  width: 100%;
  height: auto;
}
.material-step:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 10px; top: 28px; bottom: -14px;
  width: 1.5px;
  background: var(--bg-section);
}

/* ===== 강의장 / 비대면 ===== */
.contact-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--border);
}
.contact-row:last-child { border-bottom: none; }
.contact-icon {
  width: 32px; height: 32px;
  border-radius: 9px;
  background: var(--accent-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
}
.contact-content { flex: 1; min-width: 0; }
.contact-label {
  font-size: 11px;
  color: var(--text-faint);
  font-weight: 500;
}
.contact-value {
  font-size: 13px;
  font-weight: 500;
  margin-top: 1px;
  word-break: break-all;
}

/* 월별 헤더 (일정 페이지) */
.month-header {
  display: flex;
  align-items: center;
  gap: 9px;
  margin: 18px 4px 10px;
}
.month-header:first-child { margin-top: 4px; }
.month-header-text {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.month-header-line {
  flex: 1;
  height: 0.5px;
  background: var(--border);
}

/* ===== 탭바 ===== */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 480px; margin: 0 auto;
  background: rgba(255, 255, 255, 0.94);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex;
  padding: 6px 0 calc(8px + var(--safe-bottom));
  z-index: 10;
}
.tab {
  flex: 1;
  background: none; border: none;
  padding: 5px 0;
  text-align: center;
  position: relative;
  font-family: inherit;
}
.tab-icon {
  width: 21px; height: 21px;
  margin: 0 auto 3px;
  color: var(--text-faint);
  display: block;
  stroke-width: 2;
}
.tab-label {
  font-size: 11px;
  color: var(--text-faint);
  font-weight: 500;
}
.tab.active .tab-icon { color: var(--accent); stroke-width: 2.4; }
.tab.active .tab-label { color: var(--accent); font-weight: 700; }
.tab-badge {
  position: absolute;
  top: 4px;
  left: 50%; margin-left: 5px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--danger);
  border: 1.5px solid var(--bg);
}

.admin-link {

  text-align: center;
  margin-top: 24px;
  padding: 10px;
  font-size: 11px;
  color: var(--text-faint);
  text-decoration: none;
  font-weight: 500;
}
</style>

<script>
const TODAY = new Date();
TODAY.setHours(0, 0, 0, 0);

const state = {
  currentPage: 'home',
  pageTitles: {
    home: '홈',
    posts: '공지사항',
    search: '검색',
    'post-detail': '공지 상세',
    schedule: '수업일정',
    classrooms: '비대면 안내',
    rules: '이용안내',
    seminars: '특강·세미나',
    'seminar-detail': '특강·세미나',
    materials: '수업안내',
    'materials-sub': '수업안내',
    'materials-list': '수업안내',
    'materials-detail': '수업안내'
  },
  history: ['home'],
  cal: {
    year: TODAY.getFullYear(),
    month: TODAY.getMonth(),
    selectedDate: TODAY.toISOString().split('T')[0],
    schedule: [],
    colors: []
  },
  matCatsCache: null,
  searchData: null,
  allPosts: null
};

// ============================================================
// 읽음/북마크
// ============================================================
function getReadIds() {
  try { return JSON.parse(localStorage.getItem('read_posts') || '[]'); }
  catch { return []; }
}
function markRead(id) {
  const ids = new Set(getReadIds());
  ids.add(id);
  localStorage.setItem('read_posts', JSON.stringify([...ids]));
}
function isRead(id) { return getReadIds().includes(id); }

function getBookmarks() {
  try { return JSON.parse(localStorage.getItem('bookmarks') || '[]'); }
  catch { return []; }
}
function toggleBookmark(id) {
  const list = getBookmarks();
  const idx = list.indexOf(id);
  if (idx >= 0) list.splice(idx, 1);
  else list.push(id);
  localStorage.setItem('bookmarks', JSON.stringify(list));
  return list.includes(id);
}
function isBookmarked(id) { return getBookmarks().includes(id); }

// ============================================================
// 라우팅
// ============================================================
// 내부 호출 (브라우저 뒤로가기에서 호출 시 isPopState=true)
function navigate(page, params = {}, isPopState = false) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  const target = document.getElementById('page-' + page);
  if (target) target.classList.remove('hidden');
  document.getElementById('page-name').textContent = state.pageTitles[page] || '';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.querySelector(`.tab[data-page="${page}"]`);
  if (activeTab) activeTab.classList.add('active');
  
  // 브라우저 history에 push (popstate가 아닌 정상 navigate일 때만)
  if (!isPopState) {
    if (state.currentPage !== page || JSON.stringify(state.currentParams || {}) !== JSON.stringify(params)) {
      const url = page === 'home' ? '#' : `#${page}${params.id ? '/' + params.id : ''}${params.parentId ? '/' + params.parentId : ''}${params.categoryId ? '/' + params.categoryId : ''}`;
      history.pushState({ page, params }, '', url);
    }
  }
  
  state.currentPage = page;
  state.currentParams = params;

  if (page === 'home') loadHome();
  else if (page === 'posts') loadPosts();
  else if (page === 'post-detail') loadPostDetail(params.id);
  else if (page === 'schedule') loadSchedule();
  else if (page === 'classrooms') loadClassrooms();
  else if (page === 'rules') loadRules();
  else if (page === 'seminars') loadSeminars();
  else if (page === 'seminar-detail') loadSeminarDetail(params.id);
  else if (page === 'search') initSearch();
  else if (page === 'materials') loadMaterials();
  else if (page === 'materials-sub') loadMaterialsSub(params.parentId);
  else if (page === 'materials-list') loadMaterialsList(params.categoryId);
  else if (page === 'materials-detail') loadMaterialsDetail(params.id);

  window.scrollTo(0, 0);
}

function goBack() {
  // 브라우저 history의 back을 호출 → popstate 핸들러가 navigate 처리
  if (history.length > 1 && history.state) {
    history.back();
  } else {
    navigate('home');
  }
}

// 브라우저 뒤로가기 핸들러
window.addEventListener('popstate', (e) => {
  const s = e.state;
  if (s && s.page) {
    navigate(s.page, s.params || {}, true);
  } else {
    navigate('home', {}, true);
  }
});

// ============================================================
// 유틸
// ============================================================
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return `${d.getMonth() + 1}월 ${d.getDate()}일`;
}
function formatDateShort(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
function formatFullDate(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}
function formatDayShort(dateStr) {
  const d = new Date(dateStr);
  const days = ['일','월','화','수','목','금','토'];
  return days[d.getDay()];
}
function isNew(dateStr, days = 3) {
  const d = new Date(dateStr);
  const diff = (TODAY - d) / (1000 * 60 * 60 * 24);
  return diff <= days && diff >= -1;
}
function getDday(dateStr) {
  const d = new Date(dateStr);
  d.setHours(0, 0, 0, 0);
  const diff = Math.round((d - TODAY) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'D-DAY';
  if (diff > 0) return `D-${diff}`;
  return `D+${Math.abs(diff)}`;
}
function isToday(dateStr) {
  const d = new Date(dateStr);
  return d.toDateString() === TODAY.toDateString();
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
function linkifyContent(s) {
  if (s == null) return '';
  let escaped = escapeHtml(s);
  escaped = escaped.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  return escaped;
}
function tagClass(category) {
  const known = ['학사','세미나','특강','시설','평가','이벤트','취업'];
  return known.includes(category) ? `tag-${category}` : 'tag-기타';
}
function getColorById(id) {
  if (!id) return null;
  return (state.cal.colors || []).find(c => c.id === id);
}
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ============================================================
// 홈 메뉴 카드 미리보기 (수업일정 / 수업안내 / 비대면 / 특강·세미나)
// ============================================================
function renderHomeMenuPreviews({ courses, matCats, classrooms, seminars }) {
  // === 1. 수업일정 - 최신 시작일 순 3개 ===
  const sortedCourses = (courses || [])
    .filter(c => c.startDate && c.endDate)
    .sort((a, b) => (b.startDate || '').localeCompare(a.startDate || ''));
  const showC = sortedCourses.slice(0, 3);
  const moreC = sortedCourses.length - showC.length;
  document.getElementById('hm-preview-schedule').innerHTML = showC.length === 0
    ? '<div class="hm-empty">등록된 수업일정 없음</div>'
    : showC.map(c => `<div class="hm-item"><span class="dot"></span>${escapeHtml(c.name)}</div>`).join('') +
      (moreC > 0 ? `<div class="hm-more">+${moreC}개</div>` : '');
  
  // === 2. 수업안내 - 카테고리 이름 (최대 3개 + 더보기) ===
  // parentId 없는 (최상위) 카테고리만
  const topCats = (matCats || []).filter(c => !c.parentId);
  const showM = topCats.slice(0, 3);
  const moreM = topCats.length - showM.length;
  document.getElementById('hm-preview-materials').innerHTML = showM.length === 0
    ? '<div class="hm-empty">등록된 카테고리 없음</div>'
    : showM.map(c => `<div class="hm-item"><span class="dot"></span>${escapeHtml(c.name)}</div>`).join('') +
      (moreM > 0 ? `<div class="hm-more">+${moreM}개</div>` : '');
  
  // === 3. 비대면 - 줌 접속방법 + 강의장 N개 ===
  const cls = classrooms || [];
  document.getElementById('hm-preview-classrooms').innerHTML = `
    <div class="hm-item"><span class="dot"></span>줌 접속 방법</div>
    <div class="hm-item"><span class="dot"></span>${cls.length > 0 ? `강의장 ${cls.length}개` : '강의장 정보'}</div>
  `;
  
  // === 4. 특강·세미나 - 최신 등록 3개 (제목만) ===
  // order 기준으로 정렬된 데이터를 그대로 (이미 admin에서 reorder된 순서)
  // 최신 = 가장 위 = 처음 3개로 표시
  const showS = (seminars || []).slice(0, 3);
  const moreS = (seminars || []).length - showS.length;
  document.getElementById('hm-preview-seminars').innerHTML = showS.length === 0
    ? '<div class="hm-empty">등록된 세미나 없음</div>'
    : showS.map(s => `<div class="hm-item"><span class="dot"></span>${escapeHtml(s.title)}</div>`).join('') +
      (moreS > 0 ? `<div class="hm-more">+${moreS}개</div>` : '');
}

// ============================================================
// 홈
// ============================================================
function renderSeminarCarousel(seminars) {
  const wrap = document.getElementById('home-seminar-carousel');
  const track = document.getElementById('seminar-carousel-track');
  if (!wrap || !track) return;
  
  if (!seminars || seminars.length === 0) {
    wrap.style.display = 'none';
    return;
  }
  
  // 한 번 렌더링한 카드들을 두 번 반복해서 무한 슬라이드 효과
  const renderItem = (s) => {
    const dateInfo = [
      s.date ? formatDate(s.date) : '',
      s.time ? s.time : ''
    ].filter(Boolean).join(' · ');
    const visual = s.imageUrl
      ? `<div class="seminar-carousel-imgwrap"><img class="seminar-carousel-img" src="${escapeHtml(s.imageUrl)}" alt="" loading="lazy"></div>`
      : `<div class="seminar-carousel-noimg">${escapeHtml(s.title)}</div>`;
    return `
      <div class="seminar-carousel-item" onclick="navigate('seminar-detail', { id: '${s.id}' })">
        ${visual}
        <div class="seminar-carousel-info">
          <div class="seminar-carousel-title">${escapeHtml(s.title)}</div>
          <div class="seminar-carousel-meta">${dateInfo || '\u00A0'}</div>
        </div>
      </div>
    `;
  };
  
  // 적은 개수일 때도 슬라이드 효과를 보장하기 위해 반복 횟수 동적 결정
  const minCount = 6;
  let items = [...seminars];
  while (items.length < minCount) {
    items = items.concat(seminars);
  }
  // translateX -50% 트릭을 위해 두 번 복제
  const html = items.map(renderItem).join('') + items.map(renderItem).join('');
  track.innerHTML = html;
  
  // 카드 개수에 따라 애니메이션 길이 조절
  const totalCards = items.length;
  track.style.animationDuration = (totalCards * 4.5) + 's';
  
  wrap.style.display = 'block';
}

async function loadHome() {
  let data, schedule, colors, settings, courses, seminars, matCats, classrooms;
  
  try {
    [data, schedule, colors, settings, courses, seminars, matCats, classrooms] = await Promise.all([
      window.api.call('getHome'),
      window.api.call('getSchedule'),
      window.api.call('getScheduleColors'),
      window.api.call('getSettings'),
      window.api.call('getCourses').catch(() => []),
      window.api.call('getSeminars').catch(() => []),
      window.api.call('getMaterialCategories').catch(() => []),
      window.api.call('getClassrooms').catch(() => [])
    ]);
  } catch (e) {
    data = { posts: [], schedule: [], settings: {} };
    schedule = []; colors = []; settings = {}; courses = []; seminars = []; matCats = []; classrooms = [];
  }
  
  state.cal.colors = colors || [];
  
  // 세미나 캐러셀
  renderSeminarCarousel(seminars || []);
  
  // ===== 홈 메뉴 카드 미리보기 =====
  renderHomeMenuPreviews({
    courses: courses || [],
    matCats: matCats || [],
    classrooms: classrooms || [],
    seminars: seminars || []
  });

  // 안내사항
  const notice = (settings && settings.notice) ? settings.notice.trim() : '';
  if (notice) {
    document.getElementById('notice-bar').style.display = 'flex';
    const html = escapeHtml(notice).replace(/\n/g, '<br>');
    document.getElementById('notice-text').innerHTML = html;
  } else {
    document.getElementById('notice-bar').style.display = 'none';
  }

  // 오늘 날짜
  document.getElementById('day-num').textContent = `${TODAY.getMonth() + 1}월 ${TODAY.getDate()}일`;
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('day-label').textContent = `${days[TODAY.getDay()]}요일`;

  // 진행률 게이지 - 진행 중인 과정 기준
  // active=true이고 오늘 기준 가장 가까운 종강일 (또는 진행 중) 1개를 선택
  const todayStr = `${TODAY.getFullYear()}-${String(TODAY.getMonth() + 1).padStart(2, '0')}-${String(TODAY.getDate()).padStart(2, '0')}`;
  const activeCourses = (courses || []).filter(c => c.active && c.startDate && c.endDate);
  
  // 우선순위: 1) 현재 진행 중 (start <= today <= end) 중 종강 가까운 순
  //          2) 미래 시작 예정 중 시작일 가까운 순
  //          3) 종강 지난 것 중 가장 최근
  const inProgress = activeCourses.filter(c => c.startDate <= todayStr && c.endDate >= todayStr);
  inProgress.sort((a, b) => a.endDate.localeCompare(b.endDate));
  
  const upcomingCourses = activeCourses.filter(c => c.startDate > todayStr);
  upcomingCourses.sort((a, b) => a.startDate.localeCompare(b.startDate));
  
  const past = activeCourses.filter(c => c.endDate < todayStr);
  past.sort((a, b) => b.endDate.localeCompare(a.endDate));
  
  const targetCourse = inProgress[0] || upcomingCourses[0] || past[0];
  
  const progress = targetCourse 
    ? window.computeCourseProgress(targetCourse, schedule || [], colors || [])
    : null;
  
  if (progress) {
    const ddayNum = parseInt((progress.dDay.match(/-?\d+/) || ['0'])[0]);
    const dDayClass = (progress.dDay.startsWith('D-') && progress.dDay !== 'D-DAY' && ddayNum > 7) ? '' : 'danger';
    
    let stateLabel = '';
    if (targetCourse.startDate > todayStr) stateLabel = ' · 시작 예정';
    else if (targetCourse.endDate < todayStr) stateLabel = ' · 종강';
    
    document.getElementById('gauge-area').innerHTML = `
      <div class="gauge-card">
        <div class="gauge-row">
          <span class="gauge-name">${escapeHtml(targetCourse.name)}${stateLabel}</span>
          <span class="gauge-pct ${dDayClass}">${progress.dDay}</span>
        </div>
        <div class="gauge-bar"><div class="gauge-fill" style="width: ${progress.percent}%;"></div></div>
        <div class="gauge-meta">
          <span>${formatDate(targetCourse.startDate)} 시작</span>
          <span>${progress.totalSessions}회 중 ${progress.completedSessions}회차</span>
          <span>${formatDate(targetCourse.endDate)} 종강</span>
        </div>
      </div>
    `;
    
    // 통계 (휴강일 + 새 공지)
    const newPostCount = (data.posts || []).filter(p => isNew(p.date) && !isRead(p.id)).length;
    document.getElementById('stat-row').style.display = 'flex';
    document.getElementById('stat-cancel-num').textContent = progress.cancelDays;
    document.getElementById('stat-cancel-label').textContent = '과정 휴강일';
    document.getElementById('stat-new-num').textContent = newPostCount;
  } else if (targetCourse) {
    // 과정은 있는데 일정이 안 맞아서 진행률 계산 불가
    const ddayObj = new Date(targetCourse.endDate);
    ddayObj.setHours(0, 0, 0, 0);
    const ddayNum = Math.round((ddayObj - TODAY) / (1000 * 60 * 60 * 24));
    let dDay;
    if (ddayNum > 0) dDay = `D-${ddayNum}`;
    else if (ddayNum === 0) dDay = 'D-DAY';
    else dDay = `D+${Math.abs(ddayNum)}`;
    
    document.getElementById('gauge-area').innerHTML = `
      <div class="gauge-card">
        <div class="gauge-row">
          <span class="gauge-name">${escapeHtml(targetCourse.name)}</span>
          <span class="gauge-pct">${dDay}</span>
        </div>
        <div class="gauge-bar"><div class="gauge-fill" style="width: 0%;"></div></div>
        <div class="gauge-meta">
          <span>${formatDate(targetCourse.startDate)} 시작</span>
          <span>${formatDate(targetCourse.endDate)} 종강</span>
        </div>
      </div>
    `;
    document.getElementById('stat-row').style.display = 'none';
  } else {
    document.getElementById('gauge-area').innerHTML = '';
    document.getElementById('stat-row').style.display = 'none';
  }

  // 다가오는 일정
  const upcoming = (data.schedule || []).slice(0, 3);
  document.getElementById('upcoming-count').textContent = upcoming.length > 0 ? `${upcoming.length}건` : '';
  document.getElementById('home-schedule').innerHTML = upcoming.length === 0
    ? `<div class="empty">다가오는 일정이 없습니다</div>`
    : upcoming.map(renderEventRow).join('');

  // 최신 공지
  const posts = (data.posts || []).slice(0, 3);
  document.getElementById('home-posts').innerHTML = posts.length === 0
    ? `<div class="empty">아직 공지가 없습니다</div>`
    : posts.map(renderPostRow).join('');

  const hasUnread = posts.some(p => isNew(p.date) && !isRead(p.id));
  document.getElementById('bell-dot').style.display = hasUnread ? 'block' : 'none';
  document.getElementById('tab-badge').style.display = hasUnread ? 'block' : 'none';
}

function renderEventRow(s) {
  const dday = getDday(s.date);
  const d = new Date(s.date);
  d.setHours(0, 0, 0, 0);
  const diff = Math.round((d - TODAY) / (1000 * 60 * 60 * 24));
  const ddayClass = diff <= 3 && diff >= 0 ? 'urgent' : '';
  
  const color = getColorById(s.colorId);
  const dotColor = color ? color.color : '#64748b';
  
  return `
    <div class="event">
      <div class="event-date">${formatDateShort(s.date)}</div>
      <div class="event-day">${formatDayShort(s.date)}</div>
      <div class="event-dot" style="background: ${dotColor}"></div>
      <div class="event-title">${escapeHtml(s.title)}</div>
      <div class="event-dday ${ddayClass}">${dday}</div>
    </div>
  `;
}

function renderPostRow(p) {
  const newBadge = isNew(p.date) ? '<span class="post-new">NEW</span>' : '';
  const readClass = isRead(p.id) ? 'read' : '';
  const thumb = p.imageUrl 
    ? `<img class="post-thumb" src="${escapeHtml(p.imageUrl)}" alt="" loading="lazy">` 
    : '';
  return `
    <div class="post ${readClass}" onclick="openPost('${p.id}')">
      <span class="post-tag ${tagClass(p.category)}">${escapeHtml(p.category || '기타')}</span>
      <div class="post-body">
        <div class="post-title">${escapeHtml(p.title)}</div>
        <div class="post-meta">
          <span>${formatDate(p.date)}</span>
          ${newBadge}
        </div>
      </div>
      ${thumb}
    </div>
  `;
}

async function loadPosts() {

  document.getElementById('post-filters').innerHTML = categories.map(c => 
    `<button class="filter-chip ${c === '전체' ? 'active' : ''}" onclick="filterPosts('${c}')">${escapeHtml(c)}</button>`
  ).join('');
  state.allPosts = posts;
  renderPostsList(posts);
}

function filterPosts(category) {
  document.querySelectorAll('#post-filters .filter-chip').forEach(c => {
    c.classList.toggle('active', c.textContent === category);
  });
  let filtered;
  if (category === '전체') filtered = state.allPosts;
  else if (category === '북마크') filtered = state.allPosts.filter(p => isBookmarked(p.id));
  else filtered = state.allPosts.filter(p => p.category === category);
  renderPostsList(filtered);
}

function renderPostsList(posts) {
  document.getElementById('posts-list').innerHTML = posts.length === 0
    ? '<div class="empty">공지가 없습니다</div>'
    : posts.map(renderPostRow).join('');

// 캘린더
// ============================================================
async function loadSchedule() {
  const [schedule, colors, courses] = await Promise.all([
    window.api.call('getSchedule'),
    window.api.call('getScheduleColors'),
    window.api.call('getCourses').catch(() => [])
  ]);
  state.cal.schedule = schedule || [];
  state.cal.colors = colors || [];
  // active=true인 수업일정만 + 시작일 오름차순
  state.cal.courses = (courses || [])
    .filter(c => c.active && c.startDate && c.endDate)
    .sort((a, b) => a.startDate.localeCompare(b.startDate));
  
  if (state.cal.courses.length === 0) {
    state.cal.activeCourse = null;
    state.cal.courseIndex = -1;
    document.getElementById('cal-month-label').textContent = '수업일정 없음';
    document.getElementById('cal-legend').innerHTML = '<div class="empty">등록된 수업일정이 없습니다</div>';
    document.getElementById('cal-days').innerHTML = '';
    document.getElementById('cal-selected-title').innerHTML = '';
    document.getElementById('cal-selected-events').innerHTML = '';
    return;
  }
  
  // 진행 중 > 예정 > 종강 순으로 우선 선택
  const todayStr = `${TODAY.getFullYear()}-${String(TODAY.getMonth() + 1).padStart(2, '0')}-${String(TODAY.getDate()).padStart(2, '0')}`;
  const inProgressIdx = state.cal.courses.findIndex(c => c.startDate <= todayStr && c.endDate >= todayStr);
  let initialIdx;
  if (inProgressIdx >= 0) {
    initialIdx = inProgressIdx;
  } else {
    const upcomingIdx = state.cal.courses.findIndex(c => c.startDate > todayStr);
    if (upcomingIdx >= 0) {
      initialIdx = upcomingIdx;
    } else {
      // 다 종강됨 → 마지막
      initialIdx = state.cal.courses.length - 1;
    }
  }
  
  state.cal.courseIndex = initialIdx;
  state.cal.activeCourse = state.cal.courses[initialIdx];
  
  // 선택된 날짜
  if (todayStr >= state.cal.activeCourse.startDate && todayStr <= state.cal.activeCourse.endDate) {
    state.cal.selectedDate = todayStr;
  } else {
    state.cal.selectedDate = state.cal.activeCourse.startDate;
  }
  
  renderCalendarLegend();
  renderCalendar();
}

function renderCalendarLegend() {
  const colors = state.cal.colors || [];
  const course = state.cal.activeCourse;
  
  let courseInfoHtml = '';
  if (course) {
    const cancelTypeIds = new Set(
      colors.filter(c => c.type === 'cancel').map(c => c.id)
    );
    const cancelDates = (state.cal.schedule || [])
      .filter(s => 
        s.date >= course.startDate && 
        s.date <= course.endDate && 
        cancelTypeIds.has(s.colorId)
      )
      .map(s => s.date)
      .sort();
    
    let cancelLine = '';
    if (cancelDates.length > 0) {
      const dateLabels = cancelDates.map(d => formatDateShort(d)).join(', ');
      cancelLine = `<div class="cal-course-cancel">휴강 ${cancelDates.length}일 · ${dateLabels}</div>`;
    }
    
    courseInfoHtml = `
      <div class="cal-course-banner">
        <div class="cal-course-name">${escapeHtml(course.name)}</div>
        <div class="cal-course-period">${formatDate(course.startDate)} 개강 · ${formatDate(course.endDate)} 종강</div>
        ${cancelLine}
      </div>
    `;
  }
  
  let legendHtml = '';
  if (colors.length > 0) {
    legendHtml = `
      <div class="cal-legend">
        ${colors.map(c => `
          <div class="cal-legend-item">
            <span class="cal-legend-dot" style="background: ${escapeHtml(c.color)}"></span>
            <span>${escapeHtml(c.name)}</span>
          </div>
        `).join('')}
      </div>
    `;
  }
  
  document.getElementById('cal-legend').innerHTML = courseInfoHtml + legendHtml;
}

function calPrev() {
  // 이전 수업일정으로 이동
  if (state.cal.courseIndex > 0) {
    state.cal.courseIndex--;
    state.cal.activeCourse = state.cal.courses[state.cal.courseIndex];
    
    // 선택일 재설정
    const todayStr = `${TODAY.getFullYear()}-${String(TODAY.getMonth() + 1).padStart(2, '0')}-${String(TODAY.getDate()).padStart(2, '0')}`;
    if (todayStr >= state.cal.activeCourse.startDate && todayStr <= state.cal.activeCourse.endDate) {
      state.cal.selectedDate = todayStr;
    } else {
      state.cal.selectedDate = state.cal.activeCourse.startDate;
    }
    renderCalendarLegend();
    renderCalendar();
  }
}

function calNext() {
  // 다음 수업일정으로 이동
  if (state.cal.courseIndex < state.cal.courses.length - 1) {
    state.cal.courseIndex++;
    state.cal.activeCourse = state.cal.courses[state.cal.courseIndex];
    
    const todayStr = `${TODAY.getFullYear()}-${String(TODAY.getMonth() + 1).padStart(2, '0')}-${String(TODAY.getDate()).padStart(2, '0')}`;
    if (todayStr >= state.cal.activeCourse.startDate && todayStr <= state.cal.activeCourse.endDate) {
      state.cal.selectedDate = todayStr;
    } else {
      state.cal.selectedDate = state.cal.activeCourse.startDate;
    }
    renderCalendarLegend();
    renderCalendar();
  }
}

function calGoToday() {
  // "오늘" 버튼: 오늘이 포함된 수업일정으로 이동
  const todayStr = `${TODAY.getFullYear()}-${String(TODAY.getMonth() + 1).padStart(2, '0')}-${String(TODAY.getDate()).padStart(2, '0')}`;
  const todayIdx = state.cal.courses.findIndex(c => c.startDate <= todayStr && c.endDate >= todayStr);
  if (todayIdx >= 0) {
    state.cal.courseIndex = todayIdx;
    state.cal.activeCourse = state.cal.courses[todayIdx];
    state.cal.selectedDate = todayStr;
    renderCalendarLegend();
    renderCalendar();
  }
}

function calSelectDate(dateStr) {
  state.cal.selectedDate = dateStr;
  renderCalendar();
}

function renderCalendar() {
  const { selectedDate, schedule, activeCourse, courses, courseIndex } = state.cal;
  if (!activeCourse) return;
  
  // 헤더에 수업일정 이름 + 인덱스 표시
  const totalC = courses.length;
  document.getElementById('cal-month-label').textContent = `${activeCourse.name} ${totalC > 1 ? `(${courseIndex + 1}/${totalC})` : ''}`;
  
  // 화살표 활성/비활성 (전후 수업일정 있는지)
  const hasPrev = courseIndex > 0;
  const hasNext = courseIndex < totalC - 1;
  const prevBtn = document.querySelector('.cal-nav button[onclick="calPrev()"]');
  const nextBtn = document.querySelector('.cal-nav button[onclick="calNext()"]');
  if (prevBtn) prevBtn.style.opacity = hasPrev ? '1' : '0.3';
  if (nextBtn) nextBtn.style.opacity = hasNext ? '1' : '0.3';
  
  // 시작일 / 종강일 파싱
  const startD = new Date(activeCourse.startDate);
  startD.setHours(0, 0, 0, 0);
  const endD = new Date(activeCourse.endDate);
  endD.setHours(0, 0, 0, 0);
  
  // 시작일 요일 (0=일)
  const startDayOfWeek = startD.getDay();
  
  // 시작일까지의 빈 칸 + 시작일~종강일 + 종강일 이후 빈 칸 (한 줄 채우기)
  const cells = [];
  // 빈 칸 (시작일 요일 전까지)
  for (let i = 0; i < startDayOfWeek; i++) {
    cells.push({ empty: true });
  }
  // 시작일 ~ 종강일
  const cur = new Date(startD);
  while (cur <= endD) {
    cells.push({ date: new Date(cur), empty: false });
    cur.setDate(cur.getDate() + 1);
  }
  // 마지막 줄 채우기 (토요일까지)
  while (cells.length % 7 !== 0) {
    cells.push({ empty: true });
  }
  
  const eventsByDate = {};
  schedule.forEach(s => {
    if (!eventsByDate[s.date]) eventsByDate[s.date] = [];
    eventsByDate[s.date].push(s);
  });
  
  const todayStr = `${TODAY.getFullYear()}-${String(TODAY.getMonth() + 1).padStart(2, '0')}-${String(TODAY.getDate()).padStart(2, '0')}`;
  
  const html = cells.map(cell => {
    if (cell.empty) {
      return `<div class="cal-day cal-day-empty"></div>`;
    }
    
    const date = cell.date;
    const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    const events = eventsByDate[dateStr] || [];
    const isTodayCell = date.toDateString() === TODAY.toDateString();
    const isSelected = dateStr === selectedDate;
    const dayOfWeek = date.getDay();
    const isStart = dateStr === activeCourse.startDate;
    const isEnd = dateStr === activeCourse.endDate;
    const isPast = dateStr < todayStr;
    
    let classes = ['cal-day', 'in-range'];
    if (isTodayCell) classes.push('today');
    if (isSelected) classes.push('selected');
    if (dayOfWeek === 0) classes.push('sun');
    if (dayOfWeek === 6) classes.push('sat');
    if (isStart) classes.push('start-day');
    if (isEnd) classes.push('end-day');
    if (isPast && !isTodayCell) classes.push('past');
    
    const eventDots = events.slice(0, 4).map(e => {
      const color = getColorById(e.colorId);
      const bg = color ? color.color : '#64748b';
      return `<span class="cal-event-dot" style="background: ${bg}"></span>`;
    }).join('');
    
    return `
      <div class="${classes.join(' ')}" onclick="calSelectDate('${dateStr}')">
        <div class="cal-day-num">${date.getDate()}</div>
        <div class="cal-events">${eventDots}</div>
      </div>
    `;
  }).join('');
  
  document.getElementById('cal-days').innerHTML = html;
  renderSelectedDayEvents();
}

function renderSelectedDayEvents() {
  const { selectedDate, schedule, activeCourse } = state.cal;
  
  // 수업일정이 있고 selectedDate가 기간 외면 안내만 표시
  if (activeCourse && (selectedDate < activeCourse.startDate || selectedDate > activeCourse.endDate)) {
    document.getElementById('cal-selected-title').innerHTML = '';
    document.getElementById('cal-selected-events').innerHTML = `<div class="empty">수업일정 기간 내 날짜를 선택해주세요</div>`;
    return;
  }
  
  const events = schedule.filter(s => s.date === selectedDate);
  const date = new Date(selectedDate);
  const days = ['일','월','화','수','목','금','토'];
  const isTodaySel = date.toDateString() === TODAY.toDateString();
  
  document.getElementById('cal-selected-title').innerHTML = `
    <span class="cal-selected-title-date">${date.getMonth() + 1}월 ${date.getDate()}일</span>
    <span class="cal-selected-title-day">${days[date.getDay()]}요일</span>
    ${isTodaySel ? '<span class="cal-selected-title-today">오늘</span>' : ''}
  `;
  
  if (events.length === 0) {
    document.getElementById('cal-selected-events').innerHTML = `<div class="empty">선택한 날짜에 일정이 없습니다</div>`;
    return;
  }
  
  document.getElementById('cal-selected-events').innerHTML = events.map(e => {
    const color = getColorById(e.colorId);
    const dotColor = color ? color.color : '#64748b';
    const colorName = color ? color.name : (e.category || '기타');
    return `
      <div class="event">
        <div class="event-dot" style="background: ${dotColor}"></div>
        <div class="event-title">${escapeHtml(e.title)}</div>
        <div class="event-day" style="color: ${dotColor}; font-weight: 600;">${escapeHtml(colorName)}</div>
      </div>
    `;
  }).join('');
}

async function initSearch() {
  if (!state.searchData) {
    const [posts, schedule] = await Promise.all([
      window.api.call('getPosts'),
      window.api.call('getSchedule')
    ]);
    state.searchData = { posts, schedule };
  }
  
  const input = document.getElementById('search-input');
  input.value = '';
  input.focus();
  document.getElementById('search-results').innerHTML = `
    <div class="empty">검색어를 입력하세요</div>
  `;
  
  input.oninput = (e) => {
    const q = e.target.value.trim();
    document.getElementById('search-clear').style.display = q ? 'flex' : 'none';
    runSearch(q);
  };
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-input').focus();
  document.getElementById('search-clear').style.display = 'none';
  runSearch('');
}

function runSearch(q) {
  if (!q) {
    document.getElementById('search-results').innerHTML = `<div class="empty">검색어를 입력하세요</div>`;
    return;
  }
  const ql = q.toLowerCase();
  const { posts, schedule } = state.searchData;
  
  const matchedPosts = posts.filter(p => 
    (p.title || '').toLowerCase().includes(ql) ||
    (p.content || '').toLowerCase().includes(ql) ||
    (p.category || '').toLowerCase().includes(ql)
  );
  const matchedSchedule = schedule.filter(s =>
    (s.title || '').toLowerCase().includes(ql) ||
    (s.description || '').toLowerCase().includes(ql)
  );
  
  const totalCount = matchedPosts.length + matchedSchedule.length;
  if (totalCount === 0) {
    document.getElementById('search-results').innerHTML = `<div class="empty">"${escapeHtml(q)}"에 대한 검색 결과가 없습니다</div>`;
    return;
  }
  
  let html = `<div style="font-size: 11px; color: var(--text-soft); margin: 4px 4px 10px;">총 ${totalCount}건의 결과</div>`;
  if (matchedPosts.length > 0) {
    html += `<div class="section-h" style="padding: 0 4px;"><span class="section-t">공지 ${matchedPosts.length}건</span></div>`;
    html += matchedPosts.map(p => renderPostRowHighlight(p, q)).join('');
  }
  if (matchedSchedule.length > 0) {
    html += `<div class="section-h" style="padding: 12px 4px 4px;"><span class="section-t">일정 ${matchedSchedule.length}건</span></div>`;
    html += matchedSchedule.map(renderEventRow).join('');
  }
  document.getElementById('search-results').innerHTML = html;
}

function highlightText(text, q) {
  if (!q) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const regex = new RegExp(`(${escapeRegex(q)})`, 'gi');
  return escaped.replace(regex, '<span class="search-highlight">$1</span>');
}

function renderPostRowHighlight(p, q) {
  const newBadge = isNew(p.date) ? '<span class="post-new">NEW</span>' : '';
  const readClass = isRead(p.id) ? 'read' : '';
  const thumb = p.imageUrl 
    ? `<img class="post-thumb" src="${escapeHtml(p.imageUrl)}" alt="" loading="lazy">` 
    : '';
  return `
    <div class="post ${readClass}" onclick="openPost('${p.id}')">
      <span class="post-tag ${tagClass(p.category)}">${escapeHtml(p.category || '기타')}</span>
      <div class="post-body">
        <div class="post-title">${highlightText(p.title, q)}</div>
        <div class="post-meta">
          <span>${formatDate(p.date)}</span>
          ${newBadge}
        </div>
      </div>
      ${thumb}
    </div>
  `;
}

function copyToClipboard(text, btn) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      flashCopyBtn(btn);
    }).catch(() => {
      fallbackCopy(text, btn);
    });
  } else {
    fallbackCopy(text, btn);
  }
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); flashCopyBtn(btn); } catch(_){}
  document.body.removeChild(ta);
}

function flashCopyBtn(btn) {
  if (!btn) return;
  const original = btn.innerHTML;
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  btn.style.background = '#d1fae5';
  btn.style.color = '#047857';
  setTimeout(() => {
    btn.innerHTML = original;
    btn.style.background = '';
    btn.style.color = '';
  }, 1200);
}

// ============================================================
// 외부 브라우저 강제 열기 (카톡/인스타 인앱 브라우저 우회)
// ============================================================
function isInAppBrowser() {
  const ua = (navigator.userAgent || '').toLowerCase();
  // 카카오톡 / 라인 / 인스타그램 / 페북 / 네이버앱 등 인앱 브라우저 패턴
  return /kakaotalk|line|instagram|fb_iab|fbav|naver|wv\)|wv;|whale\/|whale\s|daumapps|everytimeapp/i.test(ua);
}

// 인앱 브라우저 종류 식별
function getInAppBrowserType() {
  const ua = (navigator.userAgent || '').toLowerCase();
  if (/kakaotalk/i.test(ua)) return 'kakao';
  if (/line\//i.test(ua)) return 'line';
  if (/instagram/i.test(ua)) return 'instagram';
  if (/fb_iab|fbav/i.test(ua)) return 'facebook';
  if (/naver|whale\/|whale\s/i.test(ua)) return 'naver';
  if (/daumapps/i.test(ua)) return 'daum';
  if (/everytimeapp/i.test(ua)) return 'everytime';
  if (/(android).*(wv\)|wv;)/i.test(ua)) return 'android-webview';
  return null;
}

function isIOS() {
  const ua = navigator.userAgent || '';
  return /iPhone|iPad|iPod/i.test(ua);
}
function isAndroid() {
  return /android/i.test(navigator.userAgent || '');
}

function openExternalBrowser(url) {
  if (!url) return;
  const ua = (navigator.userAgent || '').toLowerCase();
  
  // iOS - 카톡: kakaotalk://web/openExternal?url= 스킴 지원
  // iOS 일반 인앱: 그냥 새 탭 시도
  // Android: intent:// URL로 브라우저 강제 호출
  
  if (/kakaotalk/i.test(ua)) {
    // 카톡: 외부 브라우저 강제 열기 스킴
    try {
      // iOS 카톡
      const externalUrl = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
      window.location.href = externalUrl;
      // 0.5초 후에도 안 열리면 일반 새 창 시도
      setTimeout(() => {
        try { window.open(url, '_blank'); } catch(_){}
      }, 500);
    } catch (e) {
      try { window.open(url, '_blank'); } catch(_){}
    }
    return;
  }
  
  // 안드로이드 - intent 스킴으로 외부 브라우저(크롬) 호출
  if (/android/i.test(ua) && isInAppBrowser()) {
    try {
      const intentUrl = url.replace(/^https?:\/\//, '');
      const intent = 'intent://' + intentUrl + '#Intent;scheme=https;package=com.android.chrome;end';
      window.location.href = intent;
      // 폴백
      setTimeout(() => {
        try { window.open(url, '_blank'); } catch(_){}
      }, 800);
    } catch (e) {
      try { window.open(url, '_blank'); } catch(_){}
    }
    return;
  }
  
  // 그 외 (PC, 일반 모바일 브라우저) - 그냥 새 창
  try {
    const win = window.open(url, '_blank', 'noopener,noreferrer');
    if (!win) {
      // 팝업 차단된 경우 location 이동
      window.location.href = url;
    }
  } catch (e) {
    window.location.href = url;
  }
}

// ============================================================
// 줌 가이드 - 싱글탭 = 확대 / 더블탭 = 외부 링크
// ============================================================
let zoomGuideClickTimer = null;

function onZoomGuideSingleTap(el) {
  // 더블클릭 가능성 대비 - 250ms 기다린 후 단일클릭 처리
  if (zoomGuideClickTimer) {
    // 이미 첫 클릭이 대기 중이었음 → 이건 더블클릭이니 무시 (dblclick에서 처리)
    return;
  }
  zoomGuideClickTimer = setTimeout(() => {
    // 단일클릭 = 이미지 확대
    const url = el.getAttribute('data-url');
    if (url) openImageModal(url);
    zoomGuideClickTimer = null;
  }, 280);
}

function onZoomGuideDoubleTap(el) {
  // 더블클릭 발생 → 단일클릭 타이머 취소
  if (zoomGuideClickTimer) {
    clearTimeout(zoomGuideClickTimer);
    zoomGuideClickTimer = null;
  }
  const link = el.getAttribute('data-link');
  if (link) {
    openExternalBrowser(link);
  } else {
    // 링크 없으면 그냥 확대
    const url = el.getAttribute('data-url');
    if (url) openImageModal(url);
  }
}

// ============================================================
// 인앱 브라우저 처리: 카톡 자동 전환 + 그 외 안내 배너
// ============================================================
function handleInAppBrowser() {
  const type = getInAppBrowserType();
  if (!type) return;
  
  const currentUrl = window.location.href;
  
  // 카카오톡 → 자동 전환 시도
  if (type === 'kakao') {
    // sessionStorage로 이미 전환 시도했으면 재시도 안 함 (무한 루프 방지)
    if (sessionStorage.getItem('inapp_redirect_tried')) {
      // 자동 전환 실패한 경우 → 배너 표시
      showInAppBanner(type, currentUrl);
      return;
    }
    sessionStorage.setItem('inapp_redirect_tried', '1');
    
    if (isIOS()) {
      // iOS 카톡: 전용 스킴
      window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(currentUrl);
      // 1초 후에도 페이지가 살아있으면 = 전환 실패 → 배너 표시
      setTimeout(() => {
        showInAppBanner(type, currentUrl);
      }, 1500);
    } else if (isAndroid()) {
      // 안드로이드 카톡: intent 스킴으로 크롬 호출
      const cleanUrl = currentUrl.replace(/^https?:\/\//, '');
      const intent = 'intent://' + cleanUrl + '#Intent;scheme=https;package=com.android.chrome;end';
      window.location.href = intent;
      setTimeout(() => {
        showInAppBanner(type, currentUrl);
      }, 1500);
    } else {
      showInAppBanner(type, currentUrl);
    }
    return;
  }
  
  // 그 외 인앱 (인스타/페북/라인/네이버 등) → 안내 배너만
  showInAppBanner(type, currentUrl);
}

function getInAppBrowserName(type) {
  const names = {
    'kakao': '카카오톡',
    'line': '라인',
    'instagram': '인스타그램',
    'facebook': '페이스북',
    'naver': '네이버앱',
    'daum': '다음앱',
    'everytime': '에브리타임',
    'android-webview': '인앱 브라우저'
  };
  return names[type] || '인앱 브라우저';
}

function showInAppBanner(type, url) {
  // 사용자가 닫은 적 있으면 표시 안 함
  if (sessionStorage.getItem('inapp_banner_closed')) return;
  
  const name = getInAppBrowserName(type);
  const existing = document.getElementById('inapp-banner');
  if (existing) return;
  
  const banner = document.createElement('div');
  banner.id = 'inapp-banner';
  banner.className = 'inapp-banner';
  banner.innerHTML = `
    <svg class="inapp-banner-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <div class="inapp-banner-text">
      <div class="inapp-banner-title">${escapeHtml(name)} 인앱 브라우저로 보고 있어요</div>
      <div class="inapp-banner-sub">일부 기능 (줌 링크 등)이 제한될 수 있습니다</div>
    </div>
    <button class="inapp-banner-open" onclick="openExternalBrowser('${escapeHtml(url)}')">외부 브라우저 열기</button>
    <button class="inapp-banner-close" onclick="closeInAppBanner()" aria-label="닫기">×</button>
  `;
  document.body.appendChild(banner);
  
  // 등장 애니메이션
  setTimeout(() => banner.classList.add('show'), 50);
}

function closeInAppBanner() {
  const banner = document.getElementById('inapp-banner');
  if (banner) {
    banner.classList.remove('show');
    setTimeout(() => banner.remove(), 200);
  }
  sessionStorage.setItem('inapp_banner_closed', '1');
}

document.addEventListener('DOMContentLoaded', () => {
  // 초기 진입: 현재 history entry를 home으로 등록 (replaceState)
  history.replaceState({ page: 'home', params: {} }, '', '#');
  navigate('home', {}, true);
  
  // 인앱 브라우저 처리 (페이지 로드 후 약간 딜레이)
  setTimeout(handleInAppBrowser, 600);
});
</script>
