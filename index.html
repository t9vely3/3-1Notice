<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fafaf7">
<title>SBS 아카데미 수강생 안내</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --bg: #fafaf7;
  --bg-elevated: #ffffff;
  --bg-soft: #efeee8;
  --bg-section: #f4f3ed;
  
  --text: #111111;
  --text-mid: #2d2d2d;
  --text-soft: #4a4a4a;
  --text-faint: #777777;
  
  --border: rgba(0, 0, 0, 0.07);
  --border-mid: rgba(0, 0, 0, 0.12);
  --border-strong: rgba(0, 0, 0, 0.18);
  
  --accent: #1e3a5f;
  --accent-soft: #e8eef5;
  --accent-deep: #14283f;
  
  --danger: #c8323a;
  --danger-bg: #fce8e9;
  --warning: #b45309;
  --warning-bg: #fef3e0;
  --notice: #fdf6e3;
  --notice-text: #4a3416;
  --notice-strong: #2a1d0c;
  --notice-label: #92400e;
  
  --m-1: #5b21b6; --m-1-bg: #ede9fe;
  --m-2: #047857; --m-2-bg: #d1fae5;
  --m-3: #b45309; --m-3-bg: #fef3c7;
  --m-4: #1d4ed8; --m-4-bg: #dbeafe;
  --m-5: #be185d; --m-5-bg: #fce7f3;
  
  --shadow-xs: 0 1px 1px rgba(0,0,0,0.03);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);

  --safe-top: env(safe-area-inset-top, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.014em;
}

body {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: calc(64px + var(--safe-bottom));
  background: var(--bg);
}

button { font-family: inherit; cursor: pointer; }

/* ===== 헤더 ===== */
.header {
  position: sticky;
  top: 0;
  background: rgba(250, 250, 247, 0.94);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  padding: calc(12px + var(--safe-top)) 16px 11px;
  border-bottom: 0.5px solid var(--border);
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-brand { display: flex; align-items: center; gap: 9px; }
.header-logo {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 10px;
  font-weight: 600;
}
.header-text { line-height: 1.2; }
.header-title {
  font-size: 9px;
  color: var(--text-soft);
  font-weight: 500;
}
.header-page {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.025em;
  margin-top: 1px;
}
.header-actions { display: flex; gap: 4px; }
.header-btn {
  position: relative;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg-elevated);
  display: flex; align-items: center; justify-content: center;
  border: 0.5px solid var(--border-mid);
  color: var(--text-soft);
}
.header-btn:active { transform: scale(0.95); }
.header-btn-dot {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--danger);
  border: 1.5px solid var(--bg);
  border-radius: 50%;
  top: 4px; right: 4px;
}

/* ===== 페이지 ===== */
.page { padding: 0; }
.page.hidden { display: none; }
.page-content { padding: 12px 14px 18px; }

/* ===== 안내사항 라인 ===== */
.notice-bar {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 10px 14px;
  background: var(--notice);
  border-bottom: 0.5px solid #f0e6c8;
}
.notice-icon {
  width: 13px; height: 13px;
  flex-shrink: 0;
  margin-top: 1px;
  color: var(--notice-label);
}
.notice-content { flex: 1; min-width: 0; }
.notice-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--notice-label);
  letter-spacing: 0.04em;
  margin-bottom: 3px;
}
.notice-text {
  font-size: 10.5px;
  color: var(--notice-text);
  line-height: 1.6;
  letter-spacing: -0.012em;
  word-break: keep-all;
  white-space: pre-wrap;
}
.notice-text b { font-weight: 600; color: var(--notice-strong); }

/* ===== 요약 영역 ===== */
.summary {
  padding: 12px 14px;
  border-bottom: 0.5px solid var(--border);
}
.day-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 11px;
}
.day-num {
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1;
}
.day-label {
  font-size: 10px;
  color: var(--text-soft);
  font-weight: 500;
}

.gauge-card {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 11px;
  margin-bottom: 6px;
  box-shadow: var(--shadow-xs);
}
.gauge-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 6px;
}
.gauge-name {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: -0.012em;
}
.gauge-pct {
  font-size: 9.5px;
  font-weight: 600;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.gauge-pct.danger { color: var(--danger); }
.gauge-bar {
  height: 5px;
  background: rgba(0,0,0,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.gauge-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.5s ease;
}
.gauge-meta {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--text-faint);
  margin-top: 5px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

.stat-row {
  display: flex;
  gap: 6px;
}
.stat {
  flex: 1;
  background: var(--bg-elevated);
  border-radius: 8px;
  padding: 8px 10px;
  border: 0.5px solid var(--border);
  box-shadow: var(--shadow-xs);
}
.stat-num {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.022em;
  color: var(--accent);
  line-height: 1.1;
}
.stat-num small {
  font-size: 9px;
  font-weight: 500;
  color: var(--text-faint);
  margin-left: 2px;
}
.stat-label {
  font-size: 9px;
  color: var(--text-soft);
  margin-top: 3px;
  font-weight: 500;
}

/* ===== 메뉴 (5칸 한 줄) ===== */
.menu5 {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  padding: 13px 10px 5px;
}
.menu-item {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 11px;
  padding: 10px 2px 9px;
  text-align: center;
  min-width: 0;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.15s;
  box-shadow: var(--shadow-xs);
  font-family: inherit;
}
.menu-item:active {
  transform: scale(0.94);
  box-shadow: var(--shadow-sm);
}
.menu-icon-wrap {
  width: 30px; height: 30px;
  border-radius: 9px;
  margin: 0 auto 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.menu-icon { width: 15px; height: 15px; stroke-width: 2; }
.menu-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.25;
  letter-spacing: -0.025em;
  min-height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.menu-item[data-color="1"] .menu-icon-wrap { background: var(--m-1-bg); }
.menu-item[data-color="1"] .menu-icon { color: var(--m-1); }
.menu-item[data-color="2"] .menu-icon-wrap { background: var(--m-2-bg); }
.menu-item[data-color="2"] .menu-icon { color: var(--m-2); }
.menu-item[data-color="3"] .menu-icon-wrap { background: var(--m-3-bg); }
.menu-item[data-color="3"] .menu-icon { color: var(--m-3); }
.menu-item[data-color="4"] .menu-icon-wrap { background: var(--m-4-bg); }
.menu-item[data-color="4"] .menu-icon { color: var(--m-4); }
.menu-item[data-color="5"] .menu-icon-wrap { background: var(--m-5-bg); }
.menu-item[data-color="5"] .menu-icon { color: var(--m-5); }

/* ===== 섹션 ===== */
.section {
  padding: 13px 14px 4px;
}
.section-h {
  display: flex;
  align-items: baseline;
  margin-bottom: 7px;
  gap: 8px;
}
.section-t {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: -0.018em;
}
.section-meta {
  font-size: 9px;
  color: var(--text-faint);
  font-weight: 500;
}
.section-link {
  margin-left: auto;
  font-size: 9px;
  color: var(--accent);
  font-weight: 600;
  background: none;
  border: none;
  padding: 4px 6px;
  border-radius: 4px;
  font-family: inherit;
}
.section-link:active { background: var(--bg-soft); }

/* ===== 일정 행 ===== */
.event {
  display: flex;
  align-items: center;
  padding: 7px 0;
  gap: 9px;
  border-bottom: 0.5px solid rgba(0,0,0,0.05);
  cursor: pointer;
}
.event:last-child { border-bottom: none; }
.event-date {
  font-size: 9.5px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  min-width: 32px;
}
.event-day {
  font-size: 9px;
  color: var(--text-faint);
  font-weight: 500;
  flex-shrink: 0;
}
.event-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.event-title {
  font-size: 10px;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 500;
}
.event-dday {
  font-size: 9px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  color: var(--text-faint);
}
.event-dday.urgent { color: var(--danger); }

/* ===== 공지 행 ===== */
.post {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 8px 0;
  border-bottom: 0.5px solid rgba(0,0,0,0.05);
  cursor: pointer;
  transition: opacity 0.15s;
}
.post:last-child { border-bottom: none; }
.post.read { opacity: 0.55; }
.post-tag {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 1px;
}
.post-body { flex: 1; min-width: 0; }
.post-title {
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: -0.012em;
  line-height: 1.4;
}
.post-meta {
  font-size: 9px;
  color: var(--text-faint);
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}
.post-new {
  font-size: 8.5px;
  background: var(--danger);
  color: #fff;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.tag-학사 { background: #fce8e9; color: #8a1c23; }
.tag-세미나 { background: #ebe9fc; color: #3a2e8a; }
.tag-특강 { background: #ebe9fc; color: #3a2e8a; }
.tag-시설 { background: #ddf3eb; color: #084d3a; }
.tag-평가 { background: #fbecd5; color: #683800; }
.tag-이벤트 { background: #fce8e9; color: #8a1c23; }
.tag-취업 { background: #dfeefa; color: #154d92; }
.tag-기타 { background: #ebe9e3; color: #3d3d38; }

/* ===== 빈 상태 ===== */
.empty {
  text-align: center;
  padding: 38px 16px;
  color: var(--text-faint);
  font-size: 10.5px;
}
.empty-icon {
  width: 32px; height: 32px;
  margin: 0 auto 8px;
  background: var(--bg-soft);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== 상세 페이지 ===== */
.detail-back {
  background: none; border: none;
  font-size: 11px;
  color: var(--text-mid);
  padding: 6px 8px 6px 0;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 3px;
  font-family: inherit;
  font-weight: 500;
}
.detail-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.3;
  margin: 4px 0 10px;
  padding-right: 32px;
}
.detail-title-wrap { position: relative; }
.detail-bookmark {
  position: absolute;
  top: 0; right: 0;
  width: 30px; height: 30px;
  border-radius: 6px;
  background: none;
  border: none;
  color: var(--text-faint);
  display: flex;
  align-items: center;
  justify-content: center;
}
.detail-bookmark.active { color: #d97706; }
.detail-bookmark.active svg { fill: #d97706; }
.detail-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 0.5px solid var(--border);
}
.detail-content {
  font-size: 11.5px;
  line-height: 1.85;
  white-space: pre-wrap;
  word-break: keep-all;
  color: var(--text-mid);
}
.detail-content a {
  color: var(--accent);
  text-decoration: underline;
}

/* ===== 카테고리 필터 ===== */
.filter-bar {
  display: flex; gap: 5px;
  overflow-x: auto;
  margin-bottom: 12px;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  padding: 6px 12px;
  border: 0.5px solid var(--border-mid);
  border-radius: 16px;
  background: var(--bg-elevated);
  font-size: 10.5px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-mid);
  font-weight: 500;
}
.filter-chip:active { background: var(--bg-soft); }
.filter-chip.active {
  background: var(--text);
  color: var(--bg-elevated);
  border-color: var(--text);
  font-weight: 600;
}

/* ===== 검색 ===== */
.search-bar {
  display: flex;
  align-items: center;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border-mid);
  border-radius: 10px;
  padding: 0 12px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-xs);
}
.search-bar:focus-within { border-color: var(--accent); }
.search-input {
  flex: 1;
  padding: 9px 8px;
  border: none;
  background: none;
  font-size: 11.5px;
  font-family: inherit;
  outline: none;
  color: var(--text);
}
.search-clear {
  background: none;
  border: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
}
.search-highlight {
  background: #fef3c7;
  color: #78350f;
  padding: 0 2px;
  border-radius: 2px;
  font-weight: 600;
}

/* ===== 캘린더 ===== */
.cal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding: 0 2px;
}
.cal-month {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.025em;
}
.cal-nav { display: flex; gap: 4px; align-items: center; }
.cal-nav-btn {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-mid);
}
.cal-today-btn {
  padding: 0 10px;
  height: 28px;
  border-radius: 7px;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border-mid);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-mid);
  font-family: inherit;
}
.cal-grid {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.cal-week-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--bg-section);
  border-bottom: 0.5px solid var(--border);
}
.cal-week-day {
  padding: 6px 0;
  text-align: center;
  font-size: 9px;
  font-weight: 600;
  color: var(--text-soft);
}
.cal-week-day.sun { color: var(--danger); }
.cal-week-day.sat { color: #1d4ed8; }
.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.cal-day {
  aspect-ratio: 1;
  border-right: 0.5px solid var(--border);
  border-bottom: 0.5px solid var(--border);
  padding: 4px 3px 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  position: relative;
  min-height: 44px;
}
.cal-day:nth-child(7n) { border-right: none; }
.cal-day:active { background: var(--bg-section); }
.cal-day.other-month { color: var(--text-faint); background: rgba(0, 0, 0, 0.015); }
.cal-day.selected { background: var(--accent-soft); }
.cal-day.today .cal-day-num {
  background: var(--danger);
  color: #fff;
  border-radius: 50%;
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto;
}
.cal-day-num {
  font-size: 11px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.cal-day.other-month .cal-day-num { color: var(--text-faint); }
.cal-day.sun .cal-day-num { color: var(--danger); }
.cal-day.sat .cal-day-num { color: #1d4ed8; }
.cal-day.other-month.sun .cal-day-num,
.cal-day.other-month.sat .cal-day-num { opacity: 0.5; }
.cal-events {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 3px;
  margin-top: 3px;
  width: 100%;
  flex-wrap: wrap;
}
.cal-event-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.cal-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
}
.cal-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 9.5px;
  color: var(--text-mid);
  font-weight: 500;
}
.cal-legend-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.cal-selected-day { margin-top: 14px; }
.cal-selected-title {
  font-size: 10.5px;
  font-weight: 600;
  margin-bottom: 8px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cal-selected-title-date {
  font-size: 14px;
  font-weight: 700;
}
.cal-selected-title-day {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text-soft);
}
.cal-selected-title-today {
  font-size: 9px;
  background: var(--danger);
  color: #fff;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 700;
}

/* ===== 리스트 카드 ===== */
.list-card {
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
  background: var(--bg-elevated);
  box-shadow: var(--shadow-xs);
}
.list-card-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: -0.018em;
}
.list-card-meta {
  font-size: 10px;
  color: var(--text-soft);
  margin-bottom: 6px;

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="config.js"></script>
<script>
const TODAY = new Date();
TODAY.setHours(0, 0, 0, 0);

const state = {
  currentPage: 'home',
  pageTitles: {
    home: '홈',
    posts: '공지사항',
    search: '검색',
    'post-detail': '공지 상세',
    schedule: '수업일정',
    classrooms: '비대면 안내',
    rules: '이용안내',
    seminars: '특강·세미나',
    materials: '수업안내',
    'materials-sub': '수업안내',
    'materials-list': '수업안내',
    'materials-detail': '수업안내'
  },
  history: ['home'],
  cal: {
    year: TODAY.getFullYear(),
    month: TODAY.getMonth(),
    selectedDate: TODAY.toISOString().split('T')[0],
    schedule: [],
    colors: []
  },
  matCatsCache: null,
  searchData: null,
  allPosts: null
};

// ============================================================
// 읽음/북마크
// ============================================================
function getReadIds() {
  try { return JSON.parse(localStorage.getItem('read_posts') || '[]'); }
  catch { return []; }
}
function markRead(id) {
  const ids = new Set(getReadIds());
  ids.add(id);
  localStorage.setItem('read_posts', JSON.stringify([...ids]));
}
function isRead(id) { return getReadIds().includes(id); }

function getBookmarks() {
  try { return JSON.parse(localStorage.getItem('bookmarks') || '[]'); }
  catch { return []; }
}
function toggleBookmark(id) {
  const list = getBookmarks();
  const idx = list.indexOf(id);
  if (idx >= 0) list.splice(idx, 1);
  else list.push(id);
  localStorage.setItem('bookmarks', JSON.stringify(list));
  return list.includes(id);
}
function isBookmarked(id) { return getBookmarks().includes(id); }

// ============================================================
// 라우팅
// ============================================================
function navigate(page, params = {}) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  const target = document.getElementById('page-' + page);
  if (target) target.classList.remove('hidden');
  document.getElementById('page-name').textContent = state.pageTitles[page] || '';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.querySelector(`.tab[data-page="${page}"]`);
  if (activeTab) activeTab.classList.add('active');
  if (state.currentPage !== page) state.history.push(page);
  state.currentPage = page;

  if (page === 'home') loadHome();
  else if (page === 'posts') loadPosts();
  else if (page === 'post-detail') loadPostDetail(params.id);
  else if (page === 'schedule') loadSchedule();
  else if (page === 'classrooms') loadClassrooms();
  else if (page === 'rules') loadRules();
  else if (page === 'seminars') loadSeminars();
  else if (page === 'search') initSearch();
  else if (page === 'materials') loadMaterials();
  else if (page === 'materials-sub') loadMaterialsSub(params.parentId);
  else if (page === 'materials-list') loadMaterialsList(params.categoryId);
  else if (page === 'materials-detail') loadMaterialsDetail(params.id);

  window.scrollTo(0, 0);
}

function goBack() {
  state.history.pop();
  const prev = state.history[state.history.length - 1] || 'home';
  navigate(prev);
}

// ============================================================
// 유틸
// ============================================================
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return `${d.getMonth() + 1}월 ${d.getDate()}일`;
}
function formatDateShort(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
function formatFullDate(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}
function formatDayShort(dateStr) {
  const d = new Date(dateStr);
  const days = ['일','월','화','수','목','금','토'];
  return days[d.getDay()];
}
function isNew(dateStr, days = 3) {
  const d = new Date(dateStr);
  const diff = (TODAY - d) / (1000 * 60 * 60 * 24);
  return diff <= days && diff >= -1;
}
function getDday(dateStr) {
  const d = new Date(dateStr);
  d.setHours(0, 0, 0, 0);
  const diff = Math.round((d - TODAY) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'D-DAY';
  if (diff > 0) return `D-${diff}`;
  return `D+${Math.abs(diff)}`;
}
function isToday(dateStr) {
  const d = new Date(dateStr);
  return d.toDateString() === TODAY.toDateString();
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
function linkifyContent(s) {
  if (s == null) return '';
  let escaped = escapeHtml(s);
  escaped = escaped.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  return escaped;
}
function tagClass(category) {
  const known = ['학사','세미나','특강','시설','평가','이벤트','취업'];
  return known.includes(category) ? `tag-${category}` : 'tag-기타';
}
function getColorById(id) {
  if (!id) return null;
  return (state.cal.colors || []).find(c => c.id === id);
}
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ============================================================
// 홈
// ============================================================
async function loadHome() {
  let data, schedule, colors, settings;
  
  try {
    [data, schedule, colors, settings] = await Promise.all([
      window.api.call('getHome'),
      window.api.call('getSchedule'),
      window.api.call('getScheduleColors'),
      window.api.call('getSettings')
    ]);
  } catch (e) {
    data = { posts: [], schedule: [], settings: {} };
    schedule = []; colors = []; settings = {};
  }
  
  state.cal.colors = colors || [];

  // 안내사항
  const notice = (settings && settings.notice) ? settings.notice.trim() : '';
  if (notice) {
    document.getElementById('notice-bar').style.display = 'flex';
    // \n을 <br>로, 그리고 글자 변환
    const html = escapeHtml(notice).replace(/\n/g, '<br>');
    document.getElementById('notice-text').innerHTML = html;
  } else {
    document.getElementById('notice-bar').style.display = 'none';
  }

  // 오늘 날짜
  document.getElementById('day-num').textContent = `${TODAY.getMonth() + 1}월 ${TODAY.getDate()}일`;
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('day-label').textContent = `${days[TODAY.getDay()]}요일`;

  // 진행률 게이지 (이번 달 기준)
  const targetMonth = `${TODAY.getFullYear()}-${String(TODAY.getMonth() + 1).padStart(2, '0')}`;
  const progress = window.computeMonthProgress(schedule || [], colors || [], targetMonth);
  
  if (progress) {
    const dDayClass = progress.dDay.startsWith('D-') && progress.dDay !== 'D-DAY' && parseInt(progress.dDay.replace('D-', '')) > 7 ? '' : 'danger';
    document.getElementById('gauge-area').innerHTML = `
      <div class="gauge-card">
        <div class="gauge-row">
          <span class="gauge-name">${TODAY.getMonth() + 1}월 수업 · ${progress.totalSessions}회 중 ${progress.completedSessions}회차</span>
          <span class="gauge-pct ${dDayClass}">${progress.dDay}</span>
        </div>
        <div class="gauge-bar"><div class="gauge-fill" style="width: ${progress.percent}%;"></div></div>
        <div class="gauge-meta">
          <span>${formatDate(progress.startDate)} 시작</span>
          <span>${formatDate(progress.endDate)} 종강</span>
        </div>
      </div>
    `;
    
    // 통계 (휴강일 + 새 공지)
    const newPostCount = (data.posts || []).filter(p => isNew(p.date) && !isRead(p.id)).length;
    document.getElementById('stat-row').style.display = 'flex';
    document.getElementById('stat-cancel-num').textContent = progress.cancelDays;
    document.getElementById('stat-cancel-label').textContent = `${TODAY.getMonth() + 1}월 휴강일`;
    document.getElementById('stat-new-num').textContent = newPostCount;
  } else {
    document.getElementById('gauge-area').innerHTML = '';
    document.getElementById('stat-row').style.display = 'none';
  }

  // 다가오는 일정
  const upcoming = (data.schedule || []).slice(0, 3);
  document.getElementById('upcoming-count').textContent = upcoming.length > 0 ? `${upcoming.length}건` : '';
  document.getElementById('home-schedule').innerHTML = upcoming.length === 0
    ? `<div class="empty">다가오는 일정이 없습니다</div>`
    : upcoming.map(renderEventRow).join('');

  // 최신 공지
  const posts = (data.posts || []).slice(0, 3);
  document.getElementById('home-posts').innerHTML = posts.length === 0
    ? `<div class="empty">아직 공지가 없습니다</div>`
    : posts.map(renderPostRow).join('');

  const hasUnread = posts.some(p => isNew(p.date) && !isRead(p.id));
  document.getElementById('bell-dot').style.display = hasUnread ? 'block' : 'none';
  document.getElementById('tab-badge').style.display = hasUnread ? 'block' : 'none';
}

function renderEventRow(s) {
  const dday = getDday(s.date);
  const d = new Date(s.date);
  d.setHours(0, 0, 0, 0);
  const diff = Math.round((d - TODAY) / (1000 * 60 * 60 * 24));
  const ddayClass = diff <= 3 && diff >= 0 ? 'urgent' : '';
  
  const color = getColorById(s.colorId);
  const dotColor = color ? color.color : '#64748b';
  
  return `
    <div class="event">
      <div class="event-date">${formatDateShort(s.date)}</div>
      <div class="event-day">${formatDayShort(s.date)}</div>
      <div class="event-dot" style="background: ${dotColor}"></div>
      <div class="event-title">${escapeHtml(s.title)}</div>
      <div class="event-dday ${ddayClass}">${dday}</div>
    </div>
  `;
}

function renderPostRow(p) {
  const newBadge = isNew(p.date) ? '<span class="post-new">NEW</span>' : '';
  const readClass = isRead(p.id) ? 'read' : '';
  return `
    <div class="post ${readClass}" onclick="openPost('${p.id}')">
      <span class="post-tag ${tagClass(p.category)}">${escapeHtml(p.category || '기타')}</span>
      <div class="post-body">
        <div class="post-title">${escapeHtml(p.title)}</div>
        <div class="post-meta">
          <span>${formatDate(p.date)}</span>
          ${newBadge}
        </div>
      </div>
    </div>
  `;
}

function openPost(id) {
  markRead(id);
  navigate('post-detail', { id });
}

// ============================================================
// 공지 목록
// ============================================================
async function loadPosts() {
  const posts = await window.api.call('getPosts');
  const categories = ['전체', '북마크', ...new Set(posts.map(p => p.category).filter(Boolean))];
  document.getElementById('post-filters').innerHTML = categories.map(c => 
    `<button class="filter-chip ${c === '전체' ? 'active' : ''}" onclick="filterPosts('${c}')">${escapeHtml(c)}</button>`
  ).join('');
  state.allPosts = posts;
  renderPostsList(posts);
}

function filterPosts(category) {
  document.querySelectorAll('#post-filters .filter-chip').forEach(c => {
    c.classList.toggle('active', c.textContent === category);
  });
  let filtered;
  if (category === '전체') filtered = state.allPosts;
  else if (category === '북마크') filtered = state.allPosts.filter(p => isBookmarked(p.id));
  else filtered = state.allPosts.filter(p => p.category === category);
  renderPostsList(filtered);
}

function renderPostsList(posts) {
  document.getElementById('posts-list').innerHTML = posts.length === 0
    ? '<div class="empty">공지가 없습니다</div>'
    : posts.map(renderPostRow).join('');
}

async function loadPostDetail(id) {
  const post = await window.api.call('getPost', { id });
  if (!post) {
    document.getElementById('post-detail-content').innerHTML = '<div class="empty">공지를 찾을 수 없습니다</div>';
    return;
  }
  const bookmarked = isBookmarked(post.id);
  document.getElementById('post-detail-content').innerHTML = `
    <div class="detail-title-wrap">
      <h1 class="detail-title">${escapeHtml(post.title)}</h1>
      <button class="detail-bookmark ${bookmarked ? 'active' : ''}" onclick="toggleDetailBookmark('${post.id}', this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="${bookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>
    <div class="detail-meta">
      <span class="post-tag ${tagClass(post.category)}">${escapeHtml(post.category || '기타')}</span>
      <span style="font-size: 9.5px; color: var(--text-faint); font-variant-numeric: tabular-nums;">${formatDate(post.date)}</span>
    </div>
    <div class="detail-content">${linkifyContent(post.content)}</div>
  `;
}

function toggleDetailBookmark(id, btn) {
  const active = toggleBookmark(id);
  btn.classList.toggle('active', active);
  const svg = btn.querySelector('svg');
  if (svg) svg.setAttribute('fill', active ? 'currentColor' : 'none');
}

// ============================================================
// 캘린더
// ============================================================
async function loadSchedule() {
  const [schedule, colors] = await Promise.all([
    window.api.call('getSchedule'),
    window.api.call('getScheduleColors')
  ]);
  state.cal.schedule = schedule || [];
  state.cal.colors = colors || [];
  renderCalendarLegend();
  renderCalendar();
}

function renderCalendarLegend() {
  const colors = state.cal.colors || [];
  if (colors.length === 0) {
    document.getElementById('cal-legend').innerHTML = '';
    return;
  }
  document.getElementById('cal-legend').innerHTML = `
    <div class="cal-legend">
      ${colors.map(c => `
        <div class="cal-legend-item">
          <span class="cal-legend-dot" style="background: ${escapeHtml(c.color)}"></span>
          <span>${escapeHtml(c.name)}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function calPrev() {
  state.cal.month--;
  if (state.cal.month < 0) { state.cal.month = 11; state.cal.year--; }
  renderCalendar();
}
function calNext() {
  state.cal.month++;
  if (state.cal.month > 11) { state.cal.month = 0; state.cal.year++; }
  renderCalendar();
}
function calGoToday() {
  state.cal.year = TODAY.getFullYear();
  state.cal.month = TODAY.getMonth();
  state.cal.selectedDate = TODAY.toISOString().split('T')[0];
  renderCalendar();
}
function calSelectDate(dateStr) {
  state.cal.selectedDate = dateStr;
  renderCalendar();
}

function renderCalendar() {
  const { year, month, selectedDate, schedule } = state.cal;
  document.getElementById('cal-month-label').textContent = `${year}년 ${month + 1}월`;
  
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startDayOfWeek = firstDay.getDay();
  const prevLastDay = new Date(year, month, 0).getDate();
  
  const days = [];
  for (let i = startDayOfWeek - 1; i >= 0; i--) {
    days.push({ date: new Date(year, month - 1, prevLastDay - i), otherMonth: true });
  }
  for (let i = 1; i <= daysInMonth; i++) {
    days.push({ date: new Date(year, month, i), otherMonth: false });
  }
  while (days.length < 42) {
    const lastInArr = days[days.length - 1].date;
    const next = new Date(lastInArr);
    next.setDate(next.getDate() + 1);
    days.push({ date: next, otherMonth: true });
  }
  
  const eventsByDate = {};
  schedule.forEach(s => {
    if (!eventsByDate[s.date]) eventsByDate[s.date] = [];
    eventsByDate[s.date].push(s);
  });
  
  const html = days.map(({ date, otherMonth }) => {
    const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    const events = eventsByDate[dateStr] || [];
    const isTodayCell = date.toDateString() === TODAY.toDateString();
    const isSelected = dateStr === selectedDate;
    const dayOfWeek = date.getDay();
    
    let classes = ['cal-day'];
    if (otherMonth) classes.push('other-month');
    if (isTodayCell) classes.push('today');
    if (isSelected) classes.push('selected');
    if (dayOfWeek === 0) classes.push('sun');
    if (dayOfWeek === 6) classes.push('sat');
    
    const eventDots = events.slice(0, 4).map(e => {
      const color = getColorById(e.colorId);
      const bg = color ? color.color : '#64748b';
      return `<span class="cal-event-dot" style="background: ${bg}"></span>`;
    }).join('');
    
    return `
      <div class="${classes.join(' ')}" onclick="calSelectDate('${dateStr}')">
        <div class="cal-day-num">${date.getDate()}</div>
        <div class="cal-events">${eventDots}</div>
      </div>
    `;
  }).join('');
  
  document.getElementById('cal-days').innerHTML = html;
  renderSelectedDayEvents();
}

function renderSelectedDayEvents() {
  const { selectedDate, schedule } = state.cal;
  const events = schedule.filter(s => s.date === selectedDate);
  const date = new Date(selectedDate);
  const days = ['일','월','화','수','목','금','토'];
  const isTodaySel = date.toDateString() === TODAY.toDateString();
  
  document.getElementById('cal-selected-title').innerHTML = `
    <span class="cal-selected-title-date">${date.getMonth() + 1}월 ${date.getDate()}일</span>
    <span class="cal-selected-title-day">${days[date.getDay()]}요일</span>
    ${isTodaySel ? '<span class="cal-selected-title-today">오늘</span>' : ''}
  `;
  
  if (events.length === 0) {
    document.getElementById('cal-selected-events').innerHTML = `<div class="empty">선택한 날짜에 일정이 없습니다</div>`;
    return;
  }
  
  document.getElementById('cal-selected-events').innerHTML = events.map(e => {
    const color = getColorById(e.colorId);
    const dotColor = color ? color.color : '#64748b';
    const colorName = color ? color.name : (e.category || '기타');
    return `
      <div class="event">
        <div class="event-dot" style="background: ${dotColor}"></div>
        <div class="event-title">${escapeHtml(e.title)}</div>
        <div class="event-day" style="color: ${dotColor}; font-weight: 600;">${escapeHtml(colorName)}</div>
      </div>
    `;
  }).join('');
}

// ============================================================
// 검색
// ============================================================
async function initSearch() {
  if (!state.searchData) {
    const [posts, schedule] = await Promise.all([
      window.api.call('getPosts'),
      window.api.call('getSchedule')
    ]);
    state.searchData = { posts, schedule };
  }
  
  const input = document.getElementById('search-input');
  input.value = '';
  input.focus();
  document.getElementById('search-results').innerHTML = `
    <div class="empty">검색어를 입력하세요</div>
  `;
  
  input.oninput = (e) => {
    const q = e.target.value.trim();
    document.getElementById('search-clear').style.display = q ? 'flex' : 'none';
    runSearch(q);
  };
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-input').focus();
  document.getElementById('search-clear').style.display = 'none';
  runSearch('');
}

function runSearch(q) {
  if (!q) {
    document.getElementById('search-results').innerHTML = `<div class="empty">검색어를 입력하세요</div>`;
    return;
  }
  const ql = q.toLowerCase();
  const { posts, schedule } = state.searchData;
  
  const matchedPosts = posts.filter(p => 
    (p.title || '').toLowerCase().includes(ql) ||
    (p.content || '').toLowerCase().includes(ql) ||
    (p.category || '').toLowerCase().includes(ql)
  );
  const matchedSchedule = schedule.filter(s =>
    (s.title || '').toLowerCase().includes(ql) ||
    (s.description || '').toLowerCase().includes(ql)
  );
  
  const totalCount = matchedPosts.length + matchedSchedule.length;
  if (totalCount === 0) {
    document.getElementById('search-results').innerHTML = `<div class="empty">"${escapeHtml(q)}"에 대한 검색 결과가 없습니다</div>`;
    return;
  }
  
  let html = `<div style="font-size: 9.5px; color: var(--text-soft); margin: 4px 4px 10px;">총 ${totalCount}건의 결과</div>`;
  if (matchedPosts.length > 0) {
    html += `<div class="section-h" style="padding: 0 4px;"><span class="section-t">공지 ${matchedPosts.length}건</span></div>`;
    html += matchedPosts.map(p => renderPostRowHighlight(p, q)).join('');
  }
  if (matchedSchedule.length > 0) {
    html += `<div class="section-h" style="padding: 12px 4px 4px;"><span class="section-t">일정 ${matchedSchedule.length}건</span></div>`;
    html += matchedSchedule.map(renderEventRow).join('');
  }
  document.getElementById('search-results').innerHTML = html;
}

function highlightText(text, q) {
  if (!q) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const regex = new RegExp(`(${escapeRegex(q)})`, 'gi');
  return escaped.replace(regex, '<span class="search-highlight">$1</span>');
}

function renderPostRowHighlight(p, q) {
  const newBadge = isNew(p.date) ? '<span class="post-new">NEW</span>' : '';
  const readClass = isRead(p.id) ? 'read' : '';
  return `
    <div class="post ${readClass}" onclick="openPost('${p.id}')">
      <span class="post-tag ${tagClass(p.category)}">${escapeHtml(p.category || '기타')}</span>
      <div class="post-body">
        <div class="post-title">${highlightText(p.title, q)}</div>
        <div class="post-meta">
          <span>${formatDate(p.date)}</span>
          ${newBadge}
        </div>
      </div>
    </div>
  `;
}

async function loadClassrooms() {
  const items = await window.api.call('getClassrooms');
  if (items.length === 0) {
    document.getElementById('classrooms-list').innerHTML = '<div class="empty">등록된 정보가 없습니다</div>';
    return;
  }
  document.getElementById('classrooms-list').innerHTML = items.map(c => {
    const programs = (c.programs || '').split(',').map(p => p.trim()).filter(Boolean);
    const chips = programs.length > 0 && programs[0] !== '-'
      ? `<div class="program-chips">${programs.map(p => `<span class="program-chip">${escapeHtml(p)}</span>`).join('')}</div>`
      : '';
    return `
      <div class="list-card">
        <div class="list-card-title">${escapeHtml(c.name)}</div>
        <div class="list-card-desc">${escapeHtml(c.description || '')}</div>
        ${chips}
      </div>
    `;
  }).join('');
}

  'award': '<circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>',

function getCatIconSvg(iconName) {
  return CAT_ICONS[iconName] || CAT_ICONS['file'];
}
async function loadAllCategoriesCache() {
  if (state.matCatsCache) return state.matCatsCache;
  const cats = await window.api.call('getMaterialCategories');
  state.matCatsCache = cats;
  return cats;
}
function findCategory(id) {
  if (!state.matCatsCache) return null;
  return state.matCatsCache.find(c => c.id === id);
}

async function loadMaterials() {
  const cats = await loadAllCategoriesCache();
  const topCats = cats.filter(c => !c.parentId);
  
  if (topCats.length === 0) {
    document.getElementById('materials-categories').innerHTML = `<div class="empty">등록된 수업안내가 없습니다</div>`;
    return;
  }
  
  const items = await Promise.all(topCats.map(async (cat) => {
    const hasChildren = cats.some(c => c.parentId === cat.id);
    let count;
    if (hasChildren) {
      count = cats.filter(c => c.parentId === cat.id).length;
      return { ...cat, count, isParent: true };
    } else {
      const mats = await window.api.call('getMaterials', { categoryId: cat.id });
      return { ...cat, count: mats.length, isParent: false };
    }
  }));
  
  document.getElementById('materials-categories').innerHTML = `
    <div class="material-cat-grid">
      ${items.map(c => `
        <button class="material-cat-card" data-color="${c.color || '6'}" onclick="${c.isParent ? `navigate('materials-sub', {parentId: '${c.id}'})` : `navigate('materials-list', {categoryId: '${c.id}'})`}">
          <div class="material-cat-icon-wrap">
            <svg class="material-cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${getCatIconSvg(c.icon)}</svg>
          </div>
          <div>
            <div class="material-cat-name">${escapeHtml(c.name)}</div>
            <div class="material-cat-meta" style="margin-top: 4px;">${c.isParent ? `${c.count}개 분류` : `${c.count}건`}</div>
          </div>
        </button>
      `).join('')}
    </div>
  `;
}

async function loadMaterialsSub(parentId) {
  const cats = await loadAllCategoriesCache();
  const parent = findCategory(parentId);
  const subs = cats.filter(c => c.parentId === parentId);
  if (!parent) {
    document.getElementById('materials-sub-content').innerHTML = '<div class="empty">카테고리를 찾을 수 없습니다</div>';
    return;
  }
  const subsWithCount = await Promise.all(subs.map(async (sub) => {
    const mats = await window.api.call('getMaterials', { categoryId: sub.id });
    return { ...sub, count: mats.length };
  }));
  document.getElementById('materials-sub-content').innerHTML = `
    <h1 class="detail-title" style="padding-right: 0;">${escapeHtml(parent.name)}</h1>
    <div style="font-size: 10.5px; color: var(--text-soft); margin-bottom: 18px;">${subs.length}개 분류</div>
    ${subs.length === 0 
      ? '<div class="empty">하위 분류가 없습니다</div>'
      : `<div class="material-cat-grid">
          ${subsWithCount.map(c => `
            <button class="material-cat-card" data-color="${c.color || parent.color || '6'}" onclick="navigate('materials-list', {categoryId: '${c.id}'})">
              <div class="material-cat-icon-wrap">
                <svg class="material-cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${getCatIconSvg(c.icon || parent.icon)}</svg>
              </div>
              <div>
                <div class="material-cat-name">${escapeHtml(c.name)}</div>
                <div class="material-cat-meta" style="margin-top: 4px;">${c.count}건</div>
              </div>
            </button>
          `).join('')}
        </div>`
    }
  `;
}

async function loadMaterialsList(categoryId) {
  const cats = await loadAllCategoriesCache();
  const cat = findCategory(categoryId);
  if (!cat) {
    document.getElementById('materials-list-content').innerHTML = '<div class="empty">카테고리를 찾을 수 없습니다</div>';
    return;
  }
  const parent = cat.parentId ? findCategory(cat.parentId) : null;
  const materials = await window.api.call('getMaterials', { categoryId });
  const breadcrumb = parent ? `<div class="material-detail-breadcrumb">${escapeHtml(parent.name)} › ${escapeHtml(cat.name)}</div>` : '';
  
  document.getElementById('materials-list-content').innerHTML = `
    ${breadcrumb}
    <h1 class="detail-title" style="padding-right: 0;">${escapeHtml(cat.name)}</h1>
    <div style="font-size: 10.5px; color: var(--text-soft); margin-bottom: 18px;">${materials.length}건의 자료</div>
    ${materials.length === 0 
      ? '<div class="empty">등록된 자료가 없습니다</div>'
      : materials.map((m, i) => `
        <div class="material-card" onclick="navigate('materials-detail', {id: '${m.id}'})">
          <div class="material-card-num">${i + 1}</div>
          <div class="material-card-content">
            <div class="material-card-title">${escapeHtml(m.title)}</div>
            ${m.description ? `<div class="material-card-desc">${escapeHtml(m.description)}</div>` : ''}
            <div class="material-card-meta">${(m.steps || []).length}단계</div>
          </div>
        </div>
      `).join('')
    }
  `;
}

async function loadMaterialsDetail(id) {
  const m = await window.api.call('getMaterial', { id });
  if (!m) {
    document.getElementById('materials-detail-content').innerHTML = '<div class="empty">자료를 찾을 수 없습니다</div>';
    return;
  }
  await loadAllCategoriesCache();
  const cat = findCategory(m.categoryId);
  const parent = cat && cat.parentId ? findCategory(cat.parentId) : null;
  let breadcrumb = '';
  if (cat) {
    if (parent) breadcrumb = `<div class="material-detail-breadcrumb">${escapeHtml(parent.name)} › ${escapeHtml(cat.name)}</div>`;
    else breadcrumb = `<div class="material-detail-breadcrumb">${escapeHtml(cat.name)}</div>`;
  }
  const steps = m.steps || [];
  document.getElementById('materials-detail-content').innerHTML = `
    <div class="material-detail-header">
      ${breadcrumb}
      <h1 class="material-detail-title">${escapeHtml(m.title)}</h1>
      ${m.description ? `<div class="material-detail-desc">${escapeHtml(m.description)}</div>` : ''}
    </div>
    ${steps.length === 0 
      ? '<div class="empty">단계 정보가 없습니다</div>'
      : steps.map((step, i) => `
        <div class="material-step">
          <div class="material-step-head">
            <div class="material-step-num">${i + 1}</div>
            <div class="material-step-title">${escapeHtml(step.title || '')}</div>
          </div>
          ${step.content ? `<div class="material-step-content">${linkifyContent(step.content)}</div>` : ''}
          ${step.imageUrl ? `<div class="material-step-image"><img src="${escapeHtml(step.imageUrl)}" alt="${escapeHtml(step.title || '')}" loading="lazy"></div>` : ''}
        </div>
      `).join('')
    }
  `;
}

  navigate('home');
});
